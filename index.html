<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk Farm Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f7f4;
}

header{
background:#2e7d32;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

#map{
height:65vh;
}

.panel{
padding:20px;
background:white;
}

.metric{
padding:6px;
border-bottom:1px solid #eee;
}

button{
padding:10px 14px;
margin:5px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

#farmList{
margin-top:10px;
}

</style>

</head>

<body>

<header>🌱 PlaasRisk Farm Intelligence Platform</header>

<div id="map"></div>

<div class="panel">

<button onclick="analyzeFarm()">Analyze Selected Farm</button> <button onclick="saveFarm()">Save Farm</button> <button onclick="exportPDF()">Export PDF Report</button>

<div id="results"></div>

<h3>Crop Growth</h3>
<canvas id="ndviChart"></canvas>

<h3>Saved Farms</h3>
<div id="farmList"></div>

</div>

<script>

/* ===============================
MAP INITIALIZATION
=============================== */

let map = L.map("map").setView([-25,30],6)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"OpenStreetMap" }
).addTo(map)

/* Satellite vegetation layer */

const vegetationLayer = L.tileLayer(
"https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2023_3857/default/g/{z}/{y}/{x}.jpg",
{opacity:0.6}
)

vegetationLayer.addTo(map)

let marker

map.on("click",function(e){

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

})

/* ===============================
FARM STORAGE
=============================== */

const farms=[]

function saveFarm(){

if(!marker) return

const lat = marker.getLatLng().lat
const lon = marker.getLatLng().lng

farms.push({
lat,
lon,
name:"Farm "+(farms.length+1)
})

renderFarmList()

}

function renderFarmList(){

let html=""

farms.forEach((f,i)=>{

html+=`
<div>
${f.name}
<button onclick="analyzeSavedFarm(${i})">Analyze</button>
</div>
`

})

document.getElementById("farmList").innerHTML=html

}

function analyzeSavedFarm(i){

const farm=farms[i]

marker=L.marker([farm.lat,farm.lon]).addTo(map)

analyzeFarm()

}

/* ===============================
CLIMATE DATA
=============================== */

async function getClimate(lat,lon){

const url=
`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=1995-01-01&end_date=2024-12-31&daily=temperature_2m_max,temperature_2m_min,precipitation_sum`

const res=await fetch(url)
const data=await res.json()

const temps=data.daily.temperature_2m_max
const rain=data.daily.precipitation_sum

const avgTemp=temps.reduce((a,b)=>a+b)/temps.length
const totalRain=rain.reduce((a,b)=>a+b)

return{
avgTemp,
totalRain,
daily:data.daily
}

}

/* ===============================
NDVI ESTIMATION
=============================== */

async function getNDVI(lat,lon){

const url=
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation`

const res=await fetch(url)
const data=await res.json()

const values=data.hourly.shortwave_radiation.slice(-24)

const avg=values.reduce((a,b)=>a+b)/values.length

let ndvi=avg/800
if(ndvi>1) ndvi=1

return ndvi.toFixed(2)

}

/* ===============================
SOIL MOISTURE
=============================== */

async function getSoil(lat,lon){

const url=
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=soil_moisture_0_to_7cm`

const res=await fetch(url)
const data=await res.json()

const values=data.hourly.soil_moisture_0_to_7cm.slice(-24)

const avg=values.reduce((a,b)=>a+b)/values.length

return avg.toFixed(2)

}

/* ===============================
DROUGHT PROBABILITY
=============================== */

function droughtProbability(daily){

const years={}

daily.time.forEach((d,i)=>{

const y=new Date(d).getFullYear()

if(!years[y]) years[y]=0

years[y]+=daily.precipitation_sum[i]||0

})

const totals=Object.values(years)

const drought=totals.filter(v=>v<450)

return ((drought.length/totals.length)*100).toFixed(1)

}

/* ===============================
AI MODELS
=============================== */

function farmRisk(data){

let score=0

if(data.temp>32) score+=25
if(data.rain<450) score+=30
if(data.ndvi<0.35) score+=25
if(data.soil<0.2) score+=20

let level="Low"

if(score>40) level="Moderate"
if(score>70) level="High"

return {score,level}

}

function yieldPrediction(data){

let score=0

if(data.ndvi>0.6) score+=40
else if(data.ndvi>0.4) score+=25

if(data.rain>500) score+=30
else if(data.rain>350) score+=20

if(score>80) return "Good"
if(score>50) return "Moderate"

return "Poor"

}

function recommendCrops(data){

const crops=[]

if(data.rain>500) crops.push("Maize")
if(data.rain>450) crops.push("Soybeans")
if(data.rain>350) crops.push("Sunflower")

return crops.join(", ")

}

/* ===============================
NDVI CHART
=============================== */

function drawNDVIChart(ndvi){

const values=[
ndvi*0.6,
ndvi*0.7,
ndvi*0.8,
ndvi*0.9,
ndvi
]

const ctx=document.getElementById("ndviChart")

new Chart(ctx,{
type:"line",
data:{
labels:["Early","Growth","Mid","Late","Current"],
datasets:[{
label:"NDVI Crop Growth",
data:values,
borderColor:"#2e7d32"
}]
}
})

}

/* ===============================
MAIN ANALYSIS
=============================== */

async function analyzeFarm(){

if(!marker){
alert("Click on the map to select farm")
return
}

const lat=marker.getLatLng().lat
const lon=marker.getLatLng().lng

const climate=await getClimate(lat,lon)
const ndvi=await getNDVI(lat,lon)
const soil=await getSoil(lat,lon)

const drought=droughtProbability(climate.daily)

const risk=farmRisk({
temp:climate.avgTemp,
rain:climate.totalRain,
ndvi:ndvi,
soil:soil
})

const yieldPred=yieldPrediction({
ndvi:ndvi,
rain:climate.totalRain
})

const crops=recommendCrops({
rain:climate.totalRain
})

document.getElementById("results").innerHTML=

`
<div class="metric">Average Temperature: ${climate.avgTemp.toFixed(1)} °C</div>
<div class="metric">Annual Rainfall: ${climate.totalRain.toFixed(0)} mm</div>
<div class="metric">NDVI Crop Health: ${ndvi}</div>
<div class="metric">Soil Moisture: ${soil}</div>
<div class="metric">Drought Probability: ${drought}%</div>
<div class="metric">Yield Prediction: ${yieldPred}</div>
<div class="metric">Recommended Crops: ${crops}</div>
<div class="metric">Farm Risk Score: ${risk.score} (${risk.level})</div>
`

drawNDVIChart(ndvi)

}

/* ===============================
PDF EXPORT
=============================== */

async function exportPDF(){

const { jsPDF } = window.jspdf

const canvas=await html2canvas(document.querySelector(".panel"))

const img=canvas.toDataURL("image/png")

const pdf=new jsPDF()

pdf.addImage(img,"PNG",10,10,180,120)

pdf.save("PlaasRisk_Report.pdf")

}

</script>

</body>
</html>
