<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}

.control-bar{
display:flex;gap:10px;padding:10px;background:white;
border-bottom:1px solid #ddd;flex-wrap:wrap;
}

button{
background:#2e7d32;border:none;color:white;
padding:8px 14px;border-radius:6px;cursor:pointer;
}

input{
padding:8px;border:1px solid #ccc;border-radius:6px;
}

.status-bar{margin-left:auto;font-size:13px;}

#map{height:80vh;}

.analysis-panel{
position:absolute;top:80px;right:20px;width:520px;
background:white;border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.3);
display:none;z-index:10000;
}

.panel-header{
background:#2e7d32;color:white;padding:12px;font-weight:bold;
font-size:16px;
}

.panel-body{
padding:20px;max-height:75vh;overflow:auto;
}

.metric{margin-bottom:14px;}
.metric-title{font-size:13px;color:#555;}
.metric-value{font-size:22px;font-weight:bold;}

canvas{margin-top:25px;}
</style>
</head>

<body>

<div class="control-bar">

<input id="searchInput" placeholder="Search location or lat,lon">

<input id="startYear" type="number" placeholder="Start Year">
<input id="endYear" type="number" placeholder="End Year">

<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>

<div class="status-bar" id="statusBar">Ready</div>

</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">Climate Risk Report</div>
<div class="panel-body">
<div id="metrics"></div>

<canvas id="rainChart"></canvas>
<canvas id="seasonChart"></canvas>
<canvas id="frostChart"></canvas>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

// MAP SETUP (unchanged)

let map, marker, drawnItems, selectedPoint=null, pinMode=false
let rainChart=null, seasonalChart=null, frostChart=null

function setStatus(t){document.getElementById("statusBar").innerText=t}

function initMap(){

map=L.map("map").setView([-25.7,28.2],6)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{polygon:true,rectangle:true},
edit:{featureGroup:drawnItems}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.clearLayers()
const layer=e.layer
drawnItems.addLayer(layer)
selectedPoint=layer.getBounds().getCenter()
})

map.on("click", function(e){
if(!pinMode) return
const {lat,lng}=e.latlng
if(marker) map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)
selectedPoint={lat,lng}
pinMode=false
})

}

window.onload=initMap

function activatePinMode(){pinMode=true}
function resetMap(){
if(marker) map.removeLayer(marker)
drawnItems.clearLayers()
selectedPoint=null
document.getElementById("analysisPanel").style.display="none"
}

/* SEARCH */

async function searchLocation(){
const q=document.getElementById("searchInput").value

if(q.includes(",")){
const p=q.split(",")
setPoint(parseFloat(p[0]),parseFloat(p[1]))
return
}

const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
const d=await r.json()

if(d.length>0){
setPoint(d[0].lat,d[0].lon)
}
}

function setPoint(lat,lon){
if(marker) map.removeLayer(marker)
marker=L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],10)
selectedPoint={lat,lng:lon}
}

/* FETCH */

async function fetchClimate(lat,lon){
const endYear=new Date().getFullYear()-1
const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2000-01-01&end_date=${endYear}-12-31&daily=temperature_2m_min,precipitation_sum&timezone=auto`
const r=await fetch(url)
const data=await r.json()
return data.daily
}

/* FILTER */

function filterByYearRange(daily,startYear,endYear){
if(!startYear||!endYear) return daily

let f={time:[],precipitation_sum:[],temperature_2m_min:[]}

daily.time.forEach((d,i)=>{
const y=new Date(d).getFullYear()
if(y>=startYear&&y<=endYear){
f.time.push(d)
f.precipitation_sum.push(daily.precipitation_sum[i])
f.temperature_2m_min.push(daily.temperature_2m_min[i])
}
})

return f
}

/* PROCESS */

function processClimate(daily){

let rainY={}, frostY={}

daily.time.forEach((d,i)=>{
const y=new Date(d).getFullYear()

if(!rainY[y]){
rainY[y]=0
frostY[y]=0
}

rainY[y]+=daily.precipitation_sum[i]||0
if(daily.temperature_2m_min[i]<=0) frostY[y]++
})

const years=Object.keys(rainY)
const rain=years.map(y=>rainY[y])
const frost=years.map(y=>frostY[y])

const avgRain=(rain.reduce((a,b)=>a+b)/rain.length).toFixed(0)
const avgFrost=(frost.reduce((a,b)=>a+b)/frost.length).toFixed(1)

return{years,rain,frost,avgRain,avgFrost}
}

/* DROUGHT + WET */

function classifyYears(c){

const avg=c.avgRain

let drought=[], wet=[]

c.rain.forEach((v,i)=>{
if(v<avg*0.75) drought.push(c.years[i])
if(v>avg*1.25) wet.push(c.years[i])
})

return{drought,wet}
}

/* EVENTS */

function detectEvents(daily){

let frost={}, rain10={}

daily.time.forEach((d,i)=>{
const y=new Date(d).getFullYear()
const rain=daily.precipitation_sum[i]||0
const temp=daily.temperature_2m_min[i]

if(temp<=0&&!frost[y]) frost[y]=d
if(rain>=10&&!rain10[y]) rain10[y]=d
})

return{frost,rain10}
}

/* HELPERS */

function avgDOY(obj){

let days=Object.values(obj).map(d=>{
const date=new Date(d)
const start=new Date(date.getFullYear(),0,0)
return (date-start)/(1000*60*60*24)
})

if(days.length===0) return null

return days.reduce((a,b)=>a+b)/days.length
}

function doyToDate(d){
const date=new Date(2000,0)
date.setDate(d)
return date.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})
}

/* SCORE */

function plantingScore(frostDay,rainDay){

let summer=0,winter=0

if(rainDay){
if(rainDay<320) summer=95
else if(rainDay<350) summer=75
else summer=40
}

if(frostDay){
if(frostDay<200) winter=95
else if(frostDay<260) winter=70
else winter=40
}

return{summer,winter}
}

function color(s){
if(s>=80) return "#2e7d32"
if(s>=60) return "#f9a825"
return "#e53935"
}

/* ANALYSIS */

async function runAnalysis(){

if(!selectedPoint){
alert("Select location")
return
}

setStatus("Loading...")

const raw=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

const startYear=parseInt(document.getElementById("startYear").value)
const endYear=parseInt(document.getElementById("endYear").value)

const daily=filterByYearRange(raw,startYear,endYear)

const climate=processClimate(daily)
const classif=classifyYears(climate)
const events=detectEvents(daily)

const frostDay=avgDOY(events.frost)
const rainDay=avgDOY(events.rain10)

const frostDate=frostDay?doyToDate(frostDay):"N/A"
const rainDate=rainDay?doyToDate(rainDay):"N/A"

const scores=plantingScore(frostDay,rainDay)

document.getElementById("metrics").innerHTML=`

<div class="metric"><div class="metric-title">Avg Annual Rainfall</div><div class="metric-value">${climate.avgRain} mm</div></div>

<div class="metric"><div class="metric-title">Avg Frost Days / Year</div><div class="metric-value">${climate.avgFrost}</div></div>

<div class="metric"><div class="metric-title">Drought Years</div><div class="metric-value" style="font-size:14px;color:#e53935">${classif.drought.join(", ")||"None"}</div></div>

<div class="metric"><div class="metric-title">Excess Rainfall Years</div><div class="metric-value" style="font-size:14px;color:#1e88e5">${classif.wet.join(", ")||"None"}</div></div>

<hr>

<div class="metric"><div class="metric-title">Avg First Frost</div><div class="metric-value">${frostDate}</div></div>

<div class="metric"><div class="metric-title">Avg First Rain ≥10mm</div><div class="metric-value">${rainDate}</div></div>

<hr>

<div class="metric"><div class="metric-title">🌽 Summer Score</div><div class="metric-value" style="color:${color(scores.summer)}">${scores.summer}/100</div></div>

<div class="metric"><div class="metric-title">🌾 Winter Score</div><div class="metric-value" style="color:${color(scores.winter)}">${scores.winter}/100</div></div>
`

drawCharts(climate)

document.getElementById("analysisPanel").style.display="block"

setStatus("Done")

}

/* CHARTS */

function drawCharts(c){

if(rainChart) rainChart.destroy()
rainChart=new Chart(document.getElementById("rainChart"),{
type:"bar",
data:{labels:c.years,datasets:[{label:"Annual Rainfall",data:c.rain}]}
})

if(frostChart) frostChart.destroy()
frostChart=new Chart(document.getElementById("frostChart"),{
type:"line",
data:{labels:c.years,datasets:[{label:"Frost Days",data:c.frost}]}
})

}

</script>

</body>
</html>
