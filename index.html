<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#f4f7f4;
}

.control-bar{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:10px;
background:white;
border-bottom:1px solid #ddd;
align-items:center;
}

.control-bar input,select{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2e7d32;
border:none;
color:white;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.status-bar{
margin-left:auto;
font-size:13px;
color:#555;
}

#map{
height:calc(100vh - 60px);
}

.analysis-panel{
position:absolute;
top:100px;
right:20px;
width:380px;
max-width:95vw;
background:white;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.25);
display:none;
z-index:10000;
overflow:hidden;
}

.panel-header{
background:#2e7d32;
color:white;
padding:10px;
cursor:move;
font-weight:bold;
}

.panel-body{
padding:15px;
max-height:65vh;
overflow:auto;
}

.metric{margin-bottom:12px;}

.metric-title{
font-size:13px;
color:#444;
}

.metric-value{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div class="control-bar">

<input id="searchInput" placeholder="Search location or lat,lon">

<select id="seasonWindow">
<option value="5">5 Years</option>
<option value="10" selected>10 Years</option>
<option value="15">15 Years</option>
</select>

<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>

<div class="status-bar" id="statusBar">Ready</div>

</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">

<div class="panel-header">
Farm Climate Analysis
</div>

<div class="panel-body">

<div id="metrics"></div>

<canvas id="rainChart"></canvas>
<canvas id="seasonChart"></canvas>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map
let marker
let drawnItems
let selectedPoint=null
let droughtLayer=null

let rainChart=null
let seasonalChart=null

function setStatus(t){
document.getElementById("statusBar").innerText=t
}

/* MAP */

function initMap(){

map=L.map("map").setView([-25.7,28.2],6)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{polygon:true,rectangle:true,circle:false,polyline:false,marker:false},
edit:{featureGroup:drawnItems}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.clearLayers()

const layer=e.layer
drawnItems.addLayer(layer)

selectedPoint=layer.getBounds().getCenter()

})

}

window.onload=initMap

/* SEARCH */

async function searchLocation(){

const q=document.getElementById("searchInput").value

if(q.includes(",")){
const p=q.split(",")
setPoint(parseFloat(p[0]),parseFloat(p[1]))
return
}

const url=`https://nominatim.openstreetmap.org/search?format=json&q=${q}`

const r=await fetch(url)
const d=await r.json()

if(d.length>0){
setPoint(d[0].lat,d[0].lon)
}

}

function setPoint(lat,lon){

lat=Number(lat)
lon=Number(lon)

if(marker) map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)

map.setView([lat,lon],10)

selectedPoint={lat:lat,lng:lon}

}

function activatePinMode(){

map.once("click",function(e){
setPoint(e.latlng.lat,e.latlng.lng)
})

}

function resetMap(){

drawnItems.clearLayers()

if(marker) map.removeLayer(marker)

selectedPoint=null

document.getElementById("analysisPanel").style.display="none"

}

/* FETCH CLIMATE */

async function fetchClimate(lat,lon){

const endDate=new Date().toISOString().split("T")[0]

const startYear=new Date().getFullYear()-20

const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${startYear}-01-01&end_date=${endDate}&daily=precipitation_sum,temperature_2m_min,temperature_2m_mean&timezone=auto`

const r=await fetch(url)

const data=await r.json()

return data.daily

}

/* ANNUAL */

function processClimate(daily){

let yearlyRain={}
let yearlyDays={}

daily.time.forEach((d,i)=>{

const y=new Date(d).getFullYear()

if(!yearlyRain[y]){
yearlyRain[y]=0
yearlyDays[y]=0
}

yearlyRain[y]+=daily.precipitation_sum[i]||0
yearlyDays[y]++

})

const years=Object.keys(yearlyRain)

const rain=years.map(y=>yearlyRain[y])

const avgRain=rain.reduce((a,b)=>a+b)/rain.length

return{
years,rain,
avgRain:avgRain.toFixed(0)
}

}

/* SEASONAL */

function seasonalRain(daily){

let seasons={}
let days={}

daily.time.forEach((d,i)=>{

const date=new Date(d)
const m=date.getMonth()+1
const y=date.getFullYear()

let s

if(m>=10) s=y
else if(m<=3) s=y-1
else return

const label=s+"/"+(s+1)

if(!seasons[label]){
seasons[label]=0
days[label]=0
}

seasons[label]+=daily.precipitation_sum[i]||0
days[label]++

})

let labels=Object.keys(seasons).filter(l=>days[l]>=170)

labels.sort((a,b)=>{
return parseInt(a)-parseInt(b)
})

const window=parseInt(document.getElementById("seasonWindow").value)

labels=labels.slice(-window)

const values=labels.map(l=>seasons[l])

const avg=values.reduce((a,b)=>a+b)/values.length

const drought=[]
const wet=[]

labels.forEach((l,i)=>{
drought.push(values[i]<avg*0.75)
wet.push(values[i]>avg*1.25)
})

return{labels,values,drought,wet}

}

function calculateDroughtProbability(season){

let d=0

season.drought.forEach(x=>{
if(x) d++
})

return ((d/season.labels.length)*100).toFixed(1)

}

function drawDroughtMap(lat,lon,prob){

if(droughtLayer) map.removeLayer(droughtLayer)

let color="#2e7d32"

if(prob>60) color="#c62828"
else if(prob>40) color="#fb8c00"
else if(prob>20) color="#fdd835"

droughtLayer=L.circle([lat,lon],{
radius:40000,
color:color,
fillColor:color,
fillOpacity:0.35
}).addTo(map)

droughtLayer.bindPopup("Drought Probability: "+prob+"%")

}

/* ANALYSIS */

async function runAnalysis(){

if(!selectedPoint) return

setStatus("Loading climate")

const daily=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

const climate=processClimate(daily)
const season=seasonalRain(daily)

showMetrics(climate,season)

drawRainChart(climate)
drawSeasonChart(season)

const prob=calculateDroughtProbability(season)

drawDroughtMap(selectedPoint.lat,selectedPoint.lng,prob)

document.getElementById("analysisPanel").style.display="block"

setStatus("Complete")

}

/* METRICS */

function showMetrics(c,s){

const prob=calculateDroughtProbability(s)

document.getElementById("metrics").innerHTML=`

<div class="metric">
<div class="metric-title">Average Annual Rainfall</div>
<div class="metric-value">${c.avgRain} mm</div>
</div>

<div class="metric">
<div class="metric-title">Drought Probability</div>
<div class="metric-value">${prob}%</div>
</div>

`

}

/* CHARTS */

function drawRainChart(c){

if(rainChart) rainChart.destroy()

rainChart=new Chart(document.getElementById("rainChart"),{

type:"bar",

data:{
labels:c.years,
datasets:[{
label:"Annual Rainfall",
data:c.rain,
backgroundColor:"#4CAF50"
}]
},

options:{responsive:true}

})

}

function drawSeasonChart(s){

if(seasonalChart) seasonalChart.destroy()

const colors=s.values.map((v,i)=>{
if(s.drought[i]) return "#e53935"
if(s.wet[i]) return "#1e88e5"
return "#4CAF50"
})

seasonalChart=new Chart(document.getElementById("seasonChart"),{

type:"bar",

data:{
labels:s.labels,
datasets:[{
label:"Seasonal Rainfall Oct-Mar",
data:s.values,
backgroundColor:colors
}]
},

options:{responsive:true}

})

}

</script>

</body>
</html>
