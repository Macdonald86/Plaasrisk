<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ======================================================
LOOK & FEEL SECTION
====================================================== */

:root{
--primary:#2e7d32;
--secondary:#4caf50;
--light:#f5f9f5;
--border:#e0e0e0;
--text:#333;
--danger:#f44336;
--warning:#ff9800;
--success:#4caf50;
--shadow:0 4px 20px rgba(0,0,0,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#f5f9f5,#e8f5e9);
color:var(--text);
}

.container{
max-width:1600px;
margin:auto;
padding:10px;
}

.map-section{
background:white;
border-radius:16px;
box-shadow:var(--shadow);
overflow:hidden;
}

#map{
height:75vh;
}

.control-bar{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-bottom:1px solid var(--border);
align-items:center;
}

.logo{
font-weight:700;
color:var(--primary);
font-size:1.3rem;
}

.form-control{
padding:8px;
border-radius:8px;
border:1px solid var(--border);
}

.btn{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-outline{
border:1px solid var(--primary);
background:white;
color:var(--primary);
}

.analysis-panel{
position:absolute;
top:90px;
right:20px;
width:320px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:var(--shadow);
display:none;
}

.metric{
margin-bottom:12px;
}

.metric-title{
font-size:0.85rem;
color:#777;
}

.metric-value{
font-size:1.3rem;
font-weight:600;
color:var(--primary);
}

.notification{
position:fixed;
top:20px;
right:20px;
background:var(--success);
color:white;
padding:10px 16px;
border-radius:8px;
display:none;
}

footer{
margin-top:10px;
font-size:0.8rem;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="map-section">

<div class="control-bar">

<div class="logo">
<i class="fas fa-seedling"></i> PlaasRisk
</div>

<input id="searchInput" class="form-control" placeholder="Search location or lat,long"/>

<button class="btn btn-primary" onclick="searchLocation()">Search</button>

<button class="btn btn-outline" onclick="activatePinMode()">Drop Pin</button>

<button class="btn btn-primary" onclick="generateReport()">Analyze</button>

<button class="btn btn-outline" onclick="resetMap()">Clear</button>

</div>

<div id="map"></div>

</div>

<div id="analysisPanel" class="analysis-panel"></div>

<footer>
Farm Climate Intelligence • Powered by Open-Meteo
</footer>

</div>

<div id="notification" class="notification"></div>

<!-- Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

/* ======================================================
MAP + INTERFACE SECTION
====================================================== */

let map
let currentMarker=null
let lastLocation=null
let pinMode=false
let pinHandler=null
let drawnItems

function initMap(){

map=L.map("map").setView([-25,30],5)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{
polygon:true,
rectangle:false,
circle:false,
polyline:false,
marker:false,
circlemarker:false
},
edit:{featureGroup:drawnItems}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.addLayer(e.layer)

const center=e.layer.getBounds().getCenter()

lastLocation=center

notify("Farm boundary added")

})

}

function activatePinMode(){

pinMode=!pinMode

if(pinMode){

notify("Click map to drop pin")

pinHandler=function(e){

placePin(e.latlng)

map.off("click",pinHandler)

pinMode=false

}

map.on("click",pinHandler)

}else{

map.off("click",pinHandler)

}

}

function placePin(latlng){

if(currentMarker) map.removeLayer(currentMarker)

currentMarker=L.marker(latlng).addTo(map)

lastLocation=latlng

notify("Pin placed")

}

function resetMap(){

drawnItems.clearLayers()

if(currentMarker) map.removeLayer(currentMarker)

lastLocation=null

document.getElementById("analysisPanel").style.display="none"

notify("Map cleared")

}

/* ======================================================
LOCATION SEARCH
====================================================== */

async function searchLocation(){

const q=document.getElementById("searchInput").value.trim()

if(!q) return notify("Enter location")

const coord=q.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/)

if(coord){

const lat=parseFloat(coord[1])
const lon=parseFloat(coord[2])

map.setView([lat,lon],12)

placePin({lat:lat,lng:lon})

return

}

const url=`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`

const res=await fetch(url)

const data=await res.json()

if(!data.length) return notify("Location not found")

const lat=parseFloat(data[0].lat)
const lon=parseFloat(data[0].lon)

map.setView([lat,lon],12)

placePin({lat:lat,lng:lon})

}

/* ======================================================
CLIMATE API
Fetch REAL Open-Meteo Historical Data
====================================================== */

async function fetchClimate(lat, lon) {

try{

const url =
`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2020-01-01&end_date=2024-12-31&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`

const response = await fetch(url)

if(!response.ok){
throw new Error("Climate API request failed")
}

const data = await response.json()

if(!data || !data.daily || !data.daily.time){
throw new Error("Climate data unavailable")
}

return data

}catch(error){

console.error("Climate API Error:",error)

throw error

}

}

/* ======================================================
CLIMATE ANALYSIS
Annual Averages (Scientifically Correct)
====================================================== */

function analyzeClimate(data){

const daily = data.daily

const years = {}

for(let i=0;i<daily.time.length;i++){

const date = new Date(daily.time[i])
const year = date.getFullYear()

if(!years[year]){

years[year] = {
tempSum:0,
tempDays:0,
rain:0,
frost:0
}

}

const tmax = daily.temperature_2m_max[i]
const tmin = daily.temperature_2m_min[i]
const rain = daily.precipitation_sum[i]

/* ---------- Temperature ---------- */

if(tmax !== null && tmin !== null){

const meanTemp = (tmax + tmin) / 2

years[year].tempSum += meanTemp
years[year].tempDays++

}

/* ---------- Rainfall ---------- */

if(rain !== null){

years[year].rain += rain

}

/* ---------- Frost ---------- */

if(tmin !== null && tmin <= 0){

years[year].frost++

}

}

/* ======================================================
CALCULATE ANNUAL AVERAGES
====================================================== */

const annualTemps = []
const annualRain = []
const annualFrost = []

for(const year in years){

const y = years[year]

if(y.tempDays > 0){

annualTemps.push(y.tempSum / y.tempDays)

}

annualRain.push(y.rain)
annualFrost.push(y.frost)

}

/* ======================================================
FINAL METRICS
====================================================== */

const avgTemp =
(annualTemps.reduce((a,b)=>a+b,0) / annualTemps.length).toFixed(1)

const avgRain =
(annualRain.reduce((a,b)=>a+b,0) / annualRain.length).toFixed(0)

const avgFrost =
(annualFrost.reduce((a,b)=>a+b,0) / annualFrost.length).toFixed(0)

return{

avgTemp,
avgRain,
avgFrost,
years:annualTemps.length

}

}

/* ======================================================
REPORT GENERATION
====================================================== */

async function generateReport(){

if(!lastLocation){
return notify("Select location first")
}

notify("Fetching climate data...")

const lat = lastLocation.lat
const lon = lastLocation.lng

try{

const data = await fetchClimate(lat, lon)

const result = analyzeClimate(data)

showAnalysis(result)

notify("Climate analysis complete")

}catch(error){

notify("Climate data unavailable")

console.error(error)

}

}

/* ======================================================
DISPLAY RESULTS
====================================================== */

function showAnalysis(r){

const panel = document.getElementById("analysisPanel")

panel.innerHTML = `

<div class="metric">
<div class="metric-title">Average Annual Temperature</div>
<div class="metric-value">${r.avgTemp} °C</div>
</div>

<div class="metric">
<div class="metric-title">Average Annual Rainfall</div>
<div class="metric-value">${r.avgRain} mm</div>
</div>

<div class="metric">
<div class="metric-title">Average Frost Days / Year</div>
<div class="metric-value">${r.avgFrost}</div>
</div>

<div class="metric">
<div class="metric-title">Years Analyzed</div>
<div class="metric-value">${r.years}</div>
</div>

`

panel.style.display = "block"

}

/* ======================================================
UTILITY
====================================================== */

function notify(msg){

const n = document.getElementById("notification")

n.innerText = msg

n.style.display = "block"

setTimeout(()=>{

n.style.display = "none"

},3000)

}

/* ======================================================
APP START
====================================================== */

document.addEventListener("DOMContentLoaded",()=>{

initMap()

notify("PlaasRisk ready")

})
