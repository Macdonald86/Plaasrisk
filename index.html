<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk Ultimate Model</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}
.control-bar{display:flex;gap:10px;padding:10px;background:white;border-bottom:1px solid #ddd;flex-wrap:wrap;}
button{background:#2e7d32;border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;}
input{padding:8px;border:1px solid #ccc;border-radius:6px;}
#map{height:80vh;}

.analysis-panel{
position:absolute;
top:80px;
right:20px;
width:520px;
background:white;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.3);
display:none;
z-index:99999;
}

.panel-header{background:#2e7d32;color:white;padding:12px;font-weight:bold;}
.panel-body{padding:20px;max-height:75vh;overflow:auto;}
</style>
</head>

<body>

<div class="control-bar">
<input id="latInput" placeholder="Latitude">
<input id="lonInput" placeholder="Longitude">
<button onclick="setLatLon()">Set Location</button>
<input id="searchInput" placeholder="Search location">
<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">Ultimate Climate Report</div>
<div class="panel-body">
<div id="metrics"></div>
<canvas id="seasonChart"></canvas>
<canvas id="frostChart"></canvas>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map, marker, drawnItems, selectedPoint=null, pinMode=false
let seasonChart=null, frostChart=null
let globalStats=null, frostWindowData=null

/* MAP */
function initMap(){
map=L.map("map").setView([-25.7,28.2],6)
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

map.addControl(new L.Control.Draw({
draw:{polygon:true,rectangle:true},
edit:{featureGroup:drawnItems}
}))

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.clearLayers()
drawnItems.addLayer(e.layer)
selectedPoint=e.layer.getBounds().getCenter()
})

map.on("click",function(e){
if(!pinMode)return
const {lat,lng}=e.latlng
latInput.value=lat.toFixed(4)
lonInput.value=lng.toFixed(4)
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)
selectedPoint={lat,lng}
pinMode=false
})
}
window.onload=initMap

function activatePinMode(){pinMode=true}
function resetMap(){if(marker)map.removeLayer(marker);drawnItems.clearLayers();selectedPoint=null}

function setLatLon(){
selectedPoint={lat:parseFloat(latInput.value),lng:parseFloat(lonInput.value)}
}

async function searchLocation(){
const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${searchInput.value}`)
const d=await r.json()
if(d.length)selectedPoint={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)}
}

/* FETCH */
async function fetchClimate(lat,lon){
const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2020-01-01&end_date=2025-12-31&daily=temperature_2m_min,temperature_2m_max,precipitation_sum&timezone=auto`
const r=await fetch(url)
const data=await r.json()
return data.daily
}

/* SEASONAL */
function seasonalRainfall(d){
let seasons={}
d.time.forEach((t,i)=>{
const dt=new Date(t)
const m=dt.getMonth()+1
const y=dt.getFullYear()

let s
if(m>=10)s=y
else if(m<=3)s=y-1
else return

const label=s+"/"+(s+1)
if(!seasons[label])seasons[label]=0
seasons[label]+=d.precipitation_sum[i]||0
})
return seasons
}

function seasonalStats(seasons){
const years=Object.keys(seasons)
const values=Object.values(seasons)
const avg=values.reduce((a,b)=>a+b)/values.length
const percent=values.map(v=>(((v-avg)/avg)*100).toFixed(1))
return{years,values,avg,percent}
}

/* FROST */
function frostAnalysis(d){
let frost={}
d.time.forEach((t,i)=>{
const y=new Date(t).getFullYear()
if(!frost[y])frost[y]=0
if(d.temperature_2m_min[i]<=0)frost[y]++
})
return frost
}

function frostWindowAnalysis(d){

let lastFrost=null, onsetFrost=null

for(let i=0;i<d.time.length;i++){
const dt=new Date(d.time[i])
const m=dt.getMonth()+1

if(m<=6 && d.temperature_2m_min[i]<=0){
lastFrost=d.time[i]
}

if(m>=7 && !onsetFrost && d.temperature_2m_min[i]<=0){
onsetFrost=d.time[i]
}
}

function doy(d){
const dt=new Date(d)
return Math.floor((dt-new Date(dt.getFullYear(),0,0))/(1000*60*60*24))
}

function format(d){
return d?new Date(d).toLocaleDateString("en-ZA",{day:"numeric",month:"short"}):"N/A"
}

let window="N/A"
if(lastFrost && onsetFrost){
window=doy(onsetFrost)-doy(lastFrost)
}

return{
lastFrost:format(lastFrost),
onsetFrost:format(onsetFrost),
window
}
}

/* GDU */
function GDU(tmin,tmax,base){return((tmax+tmin)/2)-base}

function rain7(d,i){
let s=0
for(let j=0;j<7&&i-j>=0;j++)s+=d.precipitation_sum[i-j]||0
return s
}

function frostFree(d,i){
for(let j=0;j<7&&i+j<d.time.length;j++){
if(d.temperature_2m_min[i+j]<=0)return false
}
return true
}

function detectPlanting(d,crop){
let base=crop==="maize"?10:8
let dates=[]
for(let i=0;i<d.time.length;i++){
const dt=new Date(d.time[i])
const m=dt.getMonth()+1
if(m<8||m>12)continue

if(GDU(d.temperature_2m_min[i],d.temperature_2m_max[i],base)<5)continue
if(rain7(d,i)<20)continue
if(!frostFree(d,i))continue

dates.push(d.time[i])
}
return dates
}

function windowCalc(dates){
if(dates.length<5)return{start:"N/A",end:"N/A",length:"N/A"}

const doy=dates.map(d=>{
const dt=new Date(d)
return Math.floor((dt-new Date(dt.getFullYear(),0,0))/(1000*60*60*24))
}).sort((a,b)=>a-b)

const p20=doy[Math.floor(doy.length*0.2)]
const p80=doy[Math.floor(doy.length*0.8)]

const f=d=>{
const dt=new Date(2000,0)
dt.setDate(d)
return dt.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})
}

return{start:f(p20),end:f(p80),length:p80-p20}
}

/* CHARTS */
function drawSeason(years,values,avg){
if(seasonChart)seasonChart.destroy()
seasonChart=new Chart(document.getElementById("seasonChart"),{
type:"bar",
data:{
labels:years,
datasets:[
{label:"Rainfall",data:values},
{type:"line",label:"Avg",data:Array(years.length).fill(avg)}
]
}
})
}

function drawFrost(years,values){
if(frostChart)frostChart.destroy()
frostChart=new Chart(document.getElementById("frostChart"),{
type:"line",
data:{labels:years,datasets:[{label:"Frost Days",data:values}]}
})
}

/* ANALYSIS */
async function runAnalysis(){

if(!selectedPoint)return alert("Select location")

const d=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

const seasons=seasonalRainfall(d)
const stats=seasonalStats(seasons)
globalStats=stats

const frost=frostAnalysis(d)
const frostWindow=frostWindowAnalysis(d)
frostWindowData=frostWindow

const maizeW=windowCalc(detectPlanting(d,"maize"))
const soyW=windowCalc(detectPlanting(d,"soy"))

drawSeason(stats.years,stats.values,stats.avg)
drawFrost(Object.keys(frost),Object.values(frost))

metrics.innerHTML=`
<h3>🌧️ Seasonal Rainfall</h3>
Avg: ${stats.avg.toFixed(0)} mm<br><br>
${stats.years.map((y,i)=>`${y}: ${stats.values[i].toFixed(0)} mm (${stats.percent[i]}%)`).join("<br>")}

<h3>🌽 Maize Window</h3>
${maizeW.start} → ${maizeW.end}

<h3>🌱 Soybean Window</h3>
${soyW.start} → ${soyW.end}

<h3>❄️ Frost Window</h3>
Last Frost: ${frostWindow.lastFrost}<br>
Onset Frost: ${frostWindow.onsetFrost}<br>
Frost-Free Period: ${frostWindow.window} days
`

analysisPanel.style.display="block"
}

/* PDF */
function downloadPDF(){

if(!globalStats)return alert("Run analysis first")

const {jsPDF}=window.jspdf
const doc=new jsPDF()

doc.text("Climate Report",20,20)

const img=document.getElementById("seasonChart").toDataURL("image/png")
doc.addImage(img,"PNG",20,30,170,80)

let y=120
doc.text(`Avg: ${globalStats.avg.toFixed(0)} mm`,20,y)
y+=10

globalStats.years.forEach((yr,i)=>{
doc.text(`${yr}: ${globalStats.values[i].toFixed(0)} mm (${globalStats.percent[i]}%)`,20,y)
y+=6
})

y+=10
doc.text("Frost Window",20,y)
y+=6
doc.text(`Last Frost: ${frostWindowData.lastFrost}`,20,y)
y+=6
doc.text(`Onset Frost: ${frostWindowData.onsetFrost}`,20,y)
y+=6
doc.text(`Frost-Free Period: ${frostWindowData.window} days`,20,y)

doc.save("PlaasRisk_Report.pdf")
}

</script>

</body>
</html>
