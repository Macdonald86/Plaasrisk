```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk AI Underwriting Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}
.control-bar{display:flex;gap:10px;padding:10px;background:white;border-bottom:1px solid #ddd;flex-wrap:wrap;}
button{background:#2e7d32;border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;}
input{padding:8px;border:1px solid #ccc;border-radius:6px;}
#map{height:80vh;}
.analysis-panel{position:absolute;top:80px;right:20px;width:520px;background:white;border-radius:12px;box-shadow:0 6px 25px rgba(0,0,0,0.3);display:none;z-index:99999;}
.panel-header{background:#2e7d32;color:white;padding:12px;font-weight:bold;}
.panel-body{padding:20px;max-height:75vh;overflow:auto;}
canvas{margin-top:20px;}

.status-loading{background:#ff9800;color:white;padding:6px 12px;border-radius:6px;}
.status-success{background:#4caf50;color:white;padding:6px 12px;border-radius:6px;}
.status-error{background:#f44336;color:white;padding:6px 12px;border-radius:6px;}
</style>
</head>

<body>

<div class="control-bar">
<input id="latInput" placeholder="Latitude">
<input id="lonInput" placeholder="Longitude">
<button onclick="setLatLon()">Set Location</button>

<input id="searchInput" placeholder="Search location">
<button onclick="searchLocation()">Search</button>

<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="downloadPDF()">PDF</button>

<span id="statusIndicator">Idle</span>
</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">AI Climate Risk Report</div>
<div class="panel-body">
<div id="metrics"></div>
<canvas id="rainChart"></canvas>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map, marker, drawnItems, selectedPoint=null, pinMode=false
let rainChart=null
let reportData={}

/* STATUS */
function setStatus(type,msg){
const el=document.getElementById("statusIndicator")
el.className=""
el.innerText=msg
if(type==="loading")el.classList.add("status-loading")
if(type==="success")el.classList.add("status-success")
if(type==="error")el.classList.add("status-error")
}

/* MAP */
function initMap(){
map=L.map("map").setView([-25.7,28.2],6)
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.clearLayers()
const layer=e.layer
drawnItems.addLayer(layer)
selectedPoint=layer.getBounds().getCenter()
})

map.on("click",function(e){
if(!pinMode)return
const {lat,lng}=e.latlng
document.getElementById("latInput").value=lat.toFixed(4)
document.getElementById("lonInput").value=lng.toFixed(4)
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)
selectedPoint={lat,lng}
pinMode=false
})
}
window.onload=initMap

function activatePinMode(){pinMode=true}
function resetMap(){if(marker)map.removeLayer(marker);selectedPoint=null}

/* LOCATION */
function setLatLon(){
const lat=parseFloat(latInput.value)
const lon=parseFloat(lonInput.value)
if(isNaN(lat)||isNaN(lon)){alert("Invalid coordinates");return}
setPoint(lat,lon)
}

function setPoint(lat,lon){
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],10)
selectedPoint={lat,lng:lon}
}

async function searchLocation(){
const q=searchInput.value
const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
const d=await r.json()
if(d.length)setPoint(d[0].lat,d[0].lon)
}

/* DATA */
async function fetchClimate(lat,lon){
const endYear=new Date().getFullYear()-1
const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2000-01-01&end_date=${endYear}-12-31&daily=temperature_2m_min,precipitation_sum&timezone=auto`
const r=await fetch(url)
return (await r.json()).daily
}

/* PROCESS */
function seasonalRainfall(d){
let seasons={}
d.time.forEach((t,i)=>{
const dt=new Date(t),m=dt.getMonth()+1,y=dt.getFullYear()
let s;if(m>=10)s=y;else if(m<=3)s=y-1;else return
const label=s+"/"+(s+1)
if(!seasons[label])seasons[label]=0
seasons[label]+=d.precipitation_sum[i]||0
})
return{years:Object.keys(seasons),values:Object.values(seasons)}
}

function detectPlantingWindows(d){
let planting={}
for(let i=0;i<d.time.length;i++){
const y=new Date(d.time[i]).getFullYear()

if(d.precipitation_sum[i]>=10 && !planting[y]){
planting[y]=d.time[i];continue}

let sum=0
for(let j=0;j<10 && i+j<d.time.length;j++){
sum+=d.precipitation_sum[i+j]||0}
if(sum>=10 && !planting[y]){
planting[y]=d.time[i]}
}
return planting
}

function toDOY(dateStr){
const d=new Date(dateStr)
return Math.floor((d-new Date(d.getFullYear(),0,0))/(1000*60*60*24))
}

function doyToReadable(doy){
const d=new Date(2000,0);d.setDate(doy)
return d.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})
}

function last10Stats(seasonal,planting){
const years=seasonal.years.slice(-10)
const rain=seasonal.values.slice(-10)
const avgRain=(rain.reduce((a,b)=>a+b)/rain.length).toFixed(0)

const pYears=Object.keys(planting).slice(-10)
const pDays=pYears.map(y=>toDOY(planting[y]))

return{avgRain,pYears,pDays}
}

/* CHART */
function drawChart(years,values){
if(rainChart)rainChart.destroy()
rainChart=new Chart(document.getElementById("rainChart"),{
type:"bar",
data:{labels:years,datasets:[{label:"Seasonal Rainfall",data:values}]}
})
}

/* ANALYSIS */
async function runAnalysis(){

if(!selectedPoint){alert("Select location");return}

try{
setStatus("loading","Fetching data...")
const d=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

setStatus("loading","Processing...")
const seasonal=seasonalRainfall(d)
const planting=detectPlantingWindows(d)
const stats=last10Stats(seasonal,planting)

drawChart(seasonal.years,seasonal.values)

document.getElementById("metrics").innerHTML=`
<b>🌧️ Avg Rainfall (10 yrs):</b> ${stats.avgRain} mm<br><hr>
<b>🌱 Planting Dates:</b><br>
${stats.pYears.map((y,i)=>`${y}: ${doyToReadable(stats.pDays[i])}`).join("<br>")}
`

document.getElementById("analysisPanel").style.display="block"

setStatus("success","Done")

}catch(e){
setStatus("error","Error fetching data")
}
}

/* PDF */
function downloadPDF(){
const {jsPDF}=window.jspdf
const doc=new jsPDF()
doc.text("Climate Risk Report",20,20)
doc.text("Generated by PlaasRisk AI",20,30)
doc.text("Disclaimer: Not financial advice",20,280,{maxWidth:170})
doc.save("report.pdf")
}

</script>

<div style="font-size:11px;padding:10px;border-top:1px solid #ddd;background:#fafafa;">
<b>Disclaimer:</b> Indicative analytics only. Not insurance advice.<br><br>
<b>Developed by:</b> Makoro Macdonald
</div>

</body>
</html>
