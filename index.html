<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<style>
body{margin:0;font-family:Arial;background:#f4f6f4}
#map{height:90vh}

.control-bar{
display:flex;
gap:10px;
padding:10px;
background:white;
border-bottom:1px solid #ddd;
}

button{
padding:8px 12px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{background:#1b5e20}

input{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

.analysis-panel{
position:absolute;
top:80px;
right:20px;
width:320px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
display:none;
z-index:1000;
}

.metric{
margin-bottom:10px;
}

.metric-title{
font-size:14px;
color:#444
}

.metric-value{
font-size:20px;
font-weight:bold;
color:#2e7d32
}

.progress{
width:200px;
height:8px;
background:#ddd;
border-radius:4px;
overflow:hidden;
}

.progress-fill{
height:8px;
background:#2e7d32;
width:0%;
}

</style>
</head>

<body>

<div class="control-bar">

<input id="searchInput" placeholder="Search location or lat,lon">

<button onclick="searchLocation()">Search</button>

<button onclick="activatePinMode()">Drop Pin</button>

<button onclick="resetMap()">Clear</button>

<button onclick="generateReport()">Analyze</button>

<div class="progress">
<div class="progress-fill" id="progressFill"></div>
</div>

</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<h3>Climate Analysis</h3>
<div id="analysisContent"></div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

/* ---------------- MAP ---------------- */

let map
let drawnItems
let currentMarker=null
let lastPolygonCenter=null
let pinMode=false

function initMap(){

map=L.map("map").setView([-25.7,28.2],6)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{
polygon:true,
rectangle:true,
circle:false,
polyline:false,
marker:false
},
edit:{featureGroup:drawnItems}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.clearLayers()

const layer=e.layer
drawnItems.addLayer(layer)

const center=layer.getBounds().getCenter()

lastPolygonCenter=center

})

}

window.onload=initMap


/* ---------------- SEARCH ---------------- */

async function searchLocation(){

const input=document.getElementById("searchInput").value

if(input.includes(",")){

const parts=input.split(",")

const lat=parseFloat(parts[0])
const lon=parseFloat(parts[1])

setMarker(lat,lon)
map.setView([lat,lon],10)
return

}

const url=`https://nominatim.openstreetmap.org/search?format=json&q=${input}`

const res=await fetch(url)
const data=await res.json()

if(data.length==0) return

const place=data[0]

setMarker(place.lat,place.lon)

map.setView([place.lat,place.lon],10)

}


/* ---------------- PIN ---------------- */

function activatePinMode(){

pinMode=true

map.once("click",function(e){

setMarker(e.latlng.lat,e.latlng.lng)

pinMode=false

})

}

function setMarker(lat,lon){

if(currentMarker) map.removeLayer(currentMarker)

currentMarker=L.marker([lat,lon]).addTo(map)

lastPolygonCenter={lat:lat,lng:lon}

}


/* ---------------- RESET ---------------- */

function resetMap(){

drawnItems.clearLayers()

if(currentMarker) map.removeLayer(currentMarker)

lastPolygonCenter=null

document.getElementById("analysisPanel").style.display="none"

}


/* ---------------- CLIMATE API ---------------- */

const BASE_URL="https://archive-api.open-meteo.com/v1/archive"


async function fetchClimate(lat,lon){

const url=BASE_URL+
`?latitude=${lat}&longitude=${lon}`+
`&start_date=2000-01-01`+
`&end_date=2024-12-31`+
`&daily=temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_sum,wind_speed_10m_max`+
`&timezone=auto`

const res=await fetch(url)

return await res.json()

}


/* ---------------- METRICS ---------------- */

function avg(arr){

return arr.reduce((a,b)=>a+b,0)/arr.length

}

function heatStress(daily){

return daily.temperature_2m_max.filter(t=>t>35).length

}

function drySpells(daily){

let maxDry=0
let current=0

daily.precipitation_sum.forEach(p=>{

if(p<1){

current++
maxDry=Math.max(maxDry,current)

}else{

current=0

}

})

return maxDry

}

function hailProbability(daily){

let risk=0

daily.temperature_2m_max.forEach((t,i)=>{

const rain=daily.precipitation_sum[i]
const wind=daily.wind_speed_10m_max[i]

if(t>28 && rain>5 && wind>10) risk++

})

return Math.round((risk/daily.time.length)*100)

}


/* ---------------- ANALYSIS ---------------- */

async function generateReport(){

if(!lastPolygonCenter){

alert("Select a field or drop pin first")

return

}

updateProgress(20)

const data=await fetchClimate(lastPolygonCenter.lat,lastPolygonCenter.lng)

updateProgress(60)

const daily=data.daily

const metrics={

avgTemp:avg(daily.temperature_2m_mean).toFixed(1),
avgRain:avg(daily.precipitation_sum).toFixed(1),

heatStress:heatStress(daily),

drySpells:drySpells(daily),

hail:hailProbability(daily)

}

updateProgress(90)

displayResults(metrics)

updateProgress(100)

}


/* ---------------- RESULTS ---------------- */

function displayResults(m){

const panel=document.getElementById("analysisPanel")

panel.style.display="block"

document.getElementById("analysisContent").innerHTML=`

<div class="metric">
<div class="metric-title">Average Temperature</div>
<div class="metric-value">${m.avgTemp} °C</div>
</div>

<div class="metric">
<div class="metric-title">Average Rainfall</div>
<div class="metric-value">${m.avgRain} mm/day</div>
</div>

<div class="metric">
<div class="metric-title">Heat Stress Days</div>
<div class="metric-value">${m.heatStress}</div>
</div>

<div class="metric">
<div class="metric-title">Max Dry Spell</div>
<div class="metric-value">${m.drySpells} days</div>
</div>

<div class="metric">
<div class="metric-title">Hail Probability</div>
<div class="metric-value">${m.hail}%</div>
</div>

`

}


/* ---------------- PROGRESS ---------------- */

function updateProgress(v){

document.getElementById("progressFill").style.width=v+"%"

}

</script>

</body>
</html>
