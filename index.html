<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk AI Underwriting Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}
.control-bar{display:flex;gap:10px;padding:10px;background:white;border-bottom:1px solid #ddd;flex-wrap:wrap;}
button{background:#2e7d32;border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;}
input{padding:8px;border:1px solid #ccc;border-radius:6px;}
#map{height:80vh;}
.analysis-panel{position:absolute;top:80px;right:20px;width:520px;background:white;border-radius:12px;box-shadow:0 6px 25px rgba(0,0,0,0.3);display:none;}
.panel-header{background:#2e7d32;color:white;padding:12px;font-weight:bold;}
.panel-body{padding:20px;max-height:75vh;overflow:auto;}

.status-loading{background:#ff9800;color:white;padding:6px;border-radius:6px;}
.status-success{background:#4caf50;color:white;padding:6px;border-radius:6px;}
.status-error{background:#f44336;color:white;padding:6px;border-radius:6px;}
</style>
</head>

<body>

<div class="control-bar">
<input id="latInput" placeholder="Latitude">
<input id="lonInput" placeholder="Longitude">
<button onclick="setLatLon()">Set Location</button>

<input id="searchInput" placeholder="Search location">
<button onclick="searchLocation()">Search</button>

<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="downloadPDF()">PDF</button>

<span id="statusIndicator">Idle</span>
</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">AI Climate Risk Report</div>
<div class="panel-body">
<div id="metrics"></div>
<canvas id="rainChart"></canvas>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map, marker, drawnItems, selectedPoint=null, pinMode=false
let rainChart=null
let reportData={}

/* STATUS */
function setStatus(type,msg){
const el=document.getElementById("statusIndicator")
el.className=""
el.innerText=msg
if(type==="loading")el.classList.add("status-loading")
if(type==="success")el.classList.add("status-success")
if(type==="error")el.classList.add("status-error")
}

/* MAP */
function initMap(){
map=L.map("map").setView([-25.7,28.2],6)
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{polygon:true,rectangle:true},
edit:{featureGroup:drawnItems}
})
map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.clearLayers()
const layer=e.layer
drawnItems.addLayer(layer)
selectedPoint=layer.getBounds().getCenter()
})

map.on("click",function(e){
if(!pinMode)return
const {lat,lng}=e.latlng
latInput.value=lat.toFixed(4)
lonInput.value=lng.toFixed(4)
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)
selectedPoint={lat,lng}
pinMode=false
})
}
window.onload=initMap

function activatePinMode(){pinMode=true}
function resetMap(){if(marker)map.removeLayer(marker);drawnItems.clearLayers();selectedPoint=null}

/* LOCATION */
function setLatLon(){
const lat=parseFloat(latInput.value)
const lon=parseFloat(lonInput.value)
if(isNaN(lat)||isNaN(lon)){alert("Invalid");return}
setPoint(lat,lon)
}
function setPoint(lat,lon){
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],10)
selectedPoint={lat,lng:lon}
}
async function searchLocation(){
const q=searchInput.value
const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
const d=await r.json()
if(d.length)setPoint(d[0].lat,d[0].lon)
}

/* FETCH */
async function fetchClimate(lat,lon){
const endYear=new Date().getFullYear()-1
const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2000-01-01&end_date=${endYear}-12-31&daily=temperature_2m_min,precipitation_sum&timezone=auto`
const r=await fetch(url)
return (await r.json()).daily
}

/* PROCESS */
function seasonalRainfall(d){
let seasons={}
d.time.forEach((t,i)=>{
const dt=new Date(t),m=dt.getMonth()+1,y=dt.getFullYear()
let s;if(m>=10)s=y;else if(m<=3)s=y-1;else return
const label=s+"/"+(s+1)
if(!seasons[label])seasons[label]=0
seasons[label]+=d.precipitation_sum[i]||0
})
return{years:Object.keys(seasons),values:Object.values(seasons)}
}

function frostAnalysis(d){
let frostDays={}
d.time.forEach((t,i)=>{
const y=new Date(t).getFullYear()
if(!frostDays[y])frostDays[y]=0
if(d.temperature_2m_min[i]<=0)frostDays[y]++
})
return frostDays
}

function detectPlantingWindows(d){
let planting={}
for(let i=0;i<d.time.length;i++){
const y=new Date(d.time[i]).getFullYear()
if(d.precipitation_sum[i]>=10&&!planting[y]){planting[y]=d.time[i];continue}
let sum=0
for(let j=0;j<10&&i+j<d.time.length;j++){sum+=d.precipitation_sum[i+j]||0}
if(sum>=10&&!planting[y]){planting[y]=d.time[i]}
}
return planting
}

function toDOY(d){const dt=new Date(d);return Math.floor((dt-new Date(dt.getFullYear(),0,0))/(1000*60*60*24))}
function doyToReadable(d){const dt=new Date(2000,0);dt.setDate(d);return dt.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})}

function plantingWindowRange(p){
const days=Object.values(p).map(d=>toDOY(d)).sort((a,b)=>a-b)
if(days.length<5)return{start:"N/A",end:"N/A",length:"N/A"}
const p20=days[Math.floor(days.length*0.2)]
const p80=days[Math.floor(days.length*0.8)]
return{start:doyToReadable(p20),end:doyToReadable(p80),length:Math.round(p80-p20)}
}

function last10Stats(seasonal,planting,frost){
const rain=seasonal.values.slice(-10)
const avgRain=(rain.reduce((a,b)=>a+b)/rain.length).toFixed(0)
const frostVals=Object.values(frost).slice(-10)
const avgFrost=(frostVals.reduce((a,b)=>a+b,0)/frostVals.length).toFixed(1)
const pYears=Object.keys(planting).slice(-10)
const pDays=pYears.map(y=>toDOY(planting[y]))
return{avgRain,avgFrost,pYears,pDays}
}

function classifyRisk(r,f,w){
let s=0
if(r<400)s+=40;else if(r<600)s+=25;else s+=10
if(f>20)s+=30;else if(f>10)s+=20;else s+=10
if(w<20)s+=30;else if(w<35)s+=20;else s+=10
if(s>70)return"HIGH RISK"
if(s>50)return"MEDIUM RISK"
return"LOW RISK"
}

/* CHART */
function drawChart(y,v){
if(rainChart)rainChart.destroy()
rainChart=new Chart(document.getElementById("rainChart"),{
type:"bar",
data:{labels:y,datasets:[{label:"Seasonal Rainfall",data:v}]}
})
}

/* ANALYSIS */
async function runAnalysis(){
if(!selectedPoint){alert("Select location");return}
try{
setStatus("loading","Fetching...")
const d=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

setStatus("loading","Processing...")
const seasonal=seasonalRainfall(d)
const planting=detectPlantingWindows(d)
const frost=frostAnalysis(d)

const stats=last10Stats(seasonal,planting,frost)
const windowRange=plantingWindowRange(planting)
const risk=classifyRisk(stats.avgRain,stats.avgFrost,windowRange.length)

reportData={
lat:selectedPoint.lat.toFixed(4),
lon:selectedPoint.lng.toFixed(4),
...stats,
...windowRange,
riskLevel:risk,
plantingDates:stats.pDays.map(d=>doyToReadable(d))
}

drawChart(seasonal.years,seasonal.values)

metrics.innerHTML=`
<h3>Climate Summary</h3>
Avg Rainfall: ${stats.avgRain} mm<br>
Avg Frost Days: ${stats.avgFrost}<br>

<h3>Planting Window</h3>
Start: ${windowRange.start}<br>
End: ${windowRange.end}<br>
Length: ${windowRange.length} days<br>

<h3>Risk: ${risk}</h3>

<h3>Planting Dates</h3>
${reportData.plantingYears.map((y,i)=>`${y}: ${reportData.plantingDates[i]}`).join("<br>")}
`

analysisPanel.style.display="block"
setStatus("success","Done")

}catch(e){
setStatus("error","Error")
}
}

/* PDF */
function downloadPDF(){
if(!reportData.avgRain){alert("Run analysis first");return}
const {jsPDF}=window.jspdf
const doc=new jsPDF()

let y=20
doc.setFontSize(16)
doc.text("PlaasRisk Climate Risk Report",20,y)

y+=8
doc.setFontSize(10)
doc.text("Developed by Makoro Macdonald",20,y)

y+=10
doc.text(`Lat: ${reportData.lat} Lon: ${reportData.lon}`,20,y)

y+=10
doc.text(`Risk: ${reportData.riskLevel}`,20,y)

y+=10
doc.text(`Rainfall: ${reportData.avgRain} mm`,20,y)
y+=6
doc.text(`Frost: ${reportData.avgFrost}`,20,y)

y+=10
doc.text(`Planting Window: ${reportData.start} - ${reportData.end}`,20,y)

y+=10
const img=document.getElementById("rainChart").toDataURL("image/png")
doc.addImage(img,"PNG",20,y,170,60)

doc.addPage()
y=20
doc.text("Planting Dates",20,y)
y+=10

reportData.plantingYears.forEach((yr,i)=>{
doc.text(`${yr}: ${reportData.plantingDates[i]}`,20,y)
y+=6
})

doc.setFontSize(8)
doc.text("Disclaimer: Indicative only. Not insurance advice.",20,280,{maxWidth:170})

doc.save("PlaasRisk_Report.pdf")
}

</script>

<div style="font-size:11px;padding:10px;border-top:1px solid #ddd;background:#fafafa;">
<b>Disclaimer:</b> Indicative analytics only. Not insurance advice.<br><br>
<b>Developed by:</b> Makoro Macdonald
</div>

</body>
</html>
```
