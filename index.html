<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f7f4;
}

.control-bar{
display:flex;
gap:10px;
padding:10px;
background:white;
border-bottom:1px solid #ddd;
flex-wrap:wrap;
}

.control-bar input,
.control-bar select{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:9px 14px;
border-radius:6px;
cursor:pointer;
}

#map{
height:60vh;
width:100%;
}

.panel{
padding:15px;
background:white;
}

.metric{
margin-bottom:10px;
}

.metric-title{
font-size:13px;
color:#444;
}

.metric-value{
font-size:22px;
font-weight:bold;
color:#2e7d32;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div class="control-bar">

<input id="searchBox" placeholder="Search place or lat,lon">

<select id="seasonWindow">
<option value="5">5 years</option>
<option value="10" selected>10 years</option>
<option value="15">15 years</option>
</select>

<button onclick="searchLocation()">Search</button>
<button onclick="enablePin()">Drop Pin</button>
<button onclick="runAnalysis()">Analyze</button>

</div>

<div id="map"></div>

<div class="panel">

<div id="metrics"></div>

<canvas id="annualChart"></canvas>

<canvas id="seasonChart"></canvas>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ---------------- MAP ---------------- */

let map
let marker=null
let droughtCircle=null

let annualChart=null
let seasonChart=null

let selectedPoint=null

function initMap(){

map=L.map("map").setView([-25.7,28.2],6)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap"
}).addTo(map)

}

initMap()

/* ---------------- SEARCH ---------------- */

async function searchLocation(){

const q=document.getElementById("searchBox").value

if(q.includes(",")){

const p=q.split(",")

setPoint(parseFloat(p[0]),parseFloat(p[1]))

return

}

const url=`https://nominatim.openstreetmap.org/search?format=json&q=${q}`

const r=await fetch(url)

const data=await r.json()

if(data.length>0){

setPoint(data[0].lat,data[0].lon)

}else{

alert("Location not found")

}

}

function setPoint(lat,lon){

lat=Number(lat)
lon=Number(lon)

if(marker) map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)

map.setView([lat,lon],10)

selectedPoint={lat:lat,lng:lon}

}

/* ---------------- DROP PIN ---------------- */

function enablePin(){

map.once("click",function(e){

setPoint(e.latlng.lat,e.latlng.lng)

})

}

/* ---------------- FETCH CLIMATE ---------------- */

async function fetchClimate(lat,lon){

try{

const today=new Date()

const endDate=today.toISOString().split("T")[0]

const startYear=today.getFullYear()-20

const startDate=startYear+"-01-01"

const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${startDate}&end_date=${endDate}&daily=precipitation_sum,temperature_2m_min&models=best_match&timezone=auto`

const r=await fetch(url)

if(!r.ok){

throw new Error("API request failed")

}

const data=await r.json()

if(!data.daily){

throw new Error("No climate data returned")

}

return data.daily

}catch(err){

console.error(err)

alert("Climate data could not be loaded.")

return null

}

}

/* ---------------- ANNUAL RAIN ---------------- */

function annualRain(daily){

let rain={}
let days={}

daily.time.forEach((d,i)=>{

const y=new Date(d).getFullYear()

if(!rain[y]){

rain[y]=0
days[y]=0

}

rain[y]+=daily.precipitation_sum[i]||0
days[y]++

})

const years=Object.keys(rain)

const values=years.map(y=>rain[y])

const avg=values.reduce((a,b)=>a+b)/values.length

return{

years,
values,
avg:avg.toFixed(0)

}

}

/* ---------------- SEASONAL RAIN ---------------- */

function seasonalRain(daily){

let seasons={}
let days={}

daily.time.forEach((d,i)=>{

const date=new Date(d)

const m=date.getMonth()+1
const y=date.getFullYear()

let s

if(m>=10) s=y
else if(m<=3) s=y-1
else return

const label=s+"/"+(s+1)

if(!seasons[label]){

seasons[label]=0
days[label]=0

}

seasons[label]+=daily.precipitation_sum[i]||0

days[label]++

})

let labels=Object.keys(seasons)

labels.sort()

const window=parseInt(document.getElementById("seasonWindow").value)

labels=labels.slice(-window)

const values=labels.map(l=>seasons[l])

const avg=values.reduce((a,b)=>a+b)/values.length

const drought=[]
const wet=[]

labels.forEach((l,i)=>{

drought.push(values[i]<avg*0.75)
wet.push(values[i]>avg*1.25)

})

return{

labels,
values,
drought,
wet

}

}

/* ---------------- DROUGHT PROBABILITY ---------------- */

function droughtProbability(season){

let d=0

season.drought.forEach(x=>{

if(x) d++

})

return ((d/season.labels.length)*100).toFixed(1)

}

/* ---------------- MAP RISK CIRCLE ---------------- */

function drawDrought(lat,lon,prob){

if(droughtCircle) map.removeLayer(droughtCircle)

let color="#2e7d32"

if(prob>60) color="#c62828"
else if(prob>40) color="#fb8c00"
else if(prob>20) color="#fdd835"

droughtCircle=L.circle([lat,lon],{

radius:40000,
color:color,
fillColor:color,
fillOpacity:0.35

}).addTo(map)

}

/* ---------------- CHARTS ---------------- */

function drawAnnualChart(data){

if(annualChart) annualChart.destroy()

annualChart=new Chart(

document.getElementById("annualChart"),

{

type:"bar",

data:{
labels:data.years,
datasets:[{
label:"Annual Rainfall (mm)",
data:data.values,
backgroundColor:"#4CAF50"
}]
}

})

}

function drawSeasonChart(data){

if(seasonChart) seasonChart.destroy()

const colors=data.values.map((v,i)=>{

if(data.drought[i]) return "#e53935"
if(data.wet[i]) return "#1e88e5"

return "#4CAF50"

})

seasonChart=new Chart(

document.getElementById("seasonChart"),

{

type:"bar",

data:{
labels:data.labels,
datasets:[{
label:"Season Rainfall Oct–Mar",
data:data.values,
backgroundColor:colors
}]
}

})

}

/* ---------------- ANALYSIS ---------------- */

async function runAnalysis(){

if(!selectedPoint){

alert("Select farm location first")

return

}

const daily=await fetchClimate(

selectedPoint.lat,
selectedPoint.lng

)

if(!daily) return

const annual=annualRain(daily)

const season=seasonalRain(daily)

const prob=droughtProbability(season)

drawAnnualChart(annual)

drawSeasonChart(season)

drawDrought(selectedPoint.lat,selectedPoint.lng,prob)

document.getElementById("metrics").innerHTML=`

<div class="metric">

<div class="metric-title">Average Annual Rainfall</div>

<div class="metric-value">${annual.avg} mm</div>

</div>

<div class="metric">

<div class="metric-title">Drought Probability</div>

<div class="metric-value">${prob}%</div>

</div>

`

}

</script>

</body>

</html>
