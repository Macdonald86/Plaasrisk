<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f4f7f4;
}

#map{
height:70vh;
}

.toolbar{
padding:12px;
background:white;
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid #ddd;
}

input{
padding:8px;
width:250px;
}

button{
padding:8px 14px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.panel{
position:absolute;
right:20px;
top:120px;
width:320px;
background:white;
border-radius:8px;
padding:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.2);
display:none;
}

.metric{
margin-bottom:15px;
}

.metric h4{
margin:0;
font-size:14px;
color:#666;
}

.metric span{
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="toolbar">

<input id="searchInput" placeholder="Search location or lat,lon">

<button onclick="searchLocation()">Search</button>

<button onclick="generateReport()">Analyze Climate</button>

</div>

<div id="map"></div>

<div id="analysisPanel" class="panel">
<h3>Climate Analysis</h3>

<div class="metric">
<h4>Annual Avg Temperature</h4>
<span id="avgTemp"></span>
</div>

<div class="metric">
<h4>Annual Rainfall</h4>
<span id="avgRain"></span>
</div>

<div class="metric">
<h4>Temperature Trend</h4>
<span id="trendTemp"></span>
</div>

<div class="metric">
<h4>Rainfall Trend</h4>
<span id="trendRain"></span>
</div>

<div class="metric">
<h4>Years Analyzed</h4>
<span id="years"></span>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
MAP INITIALIZATION
========================= */

let map
let marker
let selectedLat
let selectedLon

map = L.map('map').setView([-25,30],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:18}
).addTo(map)

map.on("click",function(e){

selectedLat = e.latlng.lat
selectedLon = e.latlng.lng

if(marker) map.removeLayer(marker)

marker = L.marker(e.latlng).addTo(map)

})

/* =========================
SEARCH LOCATION
========================= */

async function searchLocation(){

let query = document.getElementById("searchInput").value

if(!query) return

if(query.includes(",")){

let parts = query.split(",")

selectedLat = parseFloat(parts[0])
selectedLon = parseFloat(parts[1])

map.setView([selectedLat,selectedLon],10)

if(marker) map.removeLayer(marker)

marker = L.marker([selectedLat,selectedLon]).addTo(map)

return

}

let url =
`https://nominatim.openstreetmap.org/search?format=json&q=${query}`

let res = await fetch(url)

let data = await res.json()

if(data.length===0) return

selectedLat = parseFloat(data[0].lat)
selectedLon = parseFloat(data[0].lon)

map.setView([selectedLat,selectedLon],10)

if(marker) map.removeLayer(marker)

marker = L.marker([selectedLat,selectedLon]).addTo(map)

}

/* =========================
FETCH HISTORICAL CLIMATE
========================= */

async function fetchClimate(){

let start = "2000-01-01"

let end = new Date().toISOString().split("T")[0]

let url =
`https://archive-api.open-meteo.com/v1/archive?latitude=${selectedLat}&longitude=${selectedLon}&start_date=${start}&end_date=${end}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`

let res = await fetch(url)

let data = await res.json()

return data

}

/* =========================
PROCESS CLIMATE DATA
========================= */

function processClimate(data){

let daily = data.daily

let years = [...new Set(
daily.time.map(d=>new Date(d).getFullYear())
)]

let annualTemp=[]
let annualRain=[]

years.forEach(year=>{

let temps=[]
let rain=0

daily.time.forEach((d,i)=>{

if(new Date(d).getFullYear()===year){

let max=daily.temperature_2m_max[i]
let min=daily.temperature_2m_min[i]

if(max!=null && min!=null){

temps.push((max+min)/2)

}

rain+=daily.precipitation_sum[i]||0

}

})

if(temps.length>0){

annualTemp.push(
temps.reduce((a,b)=>a+b)/temps.length
)

}

annualRain.push(rain)

})

let avgTemp =
annualTemp.reduce((a,b)=>a+b)/annualTemp.length

let avgRain =
annualRain.reduce((a,b)=>a+b)/annualRain.length

let tempTrend = linearTrend(annualTemp)

let rainTrend = linearTrend(annualRain)

return{
avgTemp,
avgRain,
tempTrend,
rainTrend,
years:years.length
}

}

/* =========================
TREND CALCULATION
========================= */

function linearTrend(arr){

let n=arr.length

let sumX=0
let sumY=0
let sumXY=0
let sumXX=0

for(let i=0;i<n;i++){

sumX+=i
sumY+=arr[i]
sumXY+=i*arr[i]
sumXX+=i*i

}

return (n*sumXY - sumX*sumY)/(n*sumXX - sumX*sumX)

}

/* =========================
GENERATE REPORT
========================= */

async function generateReport(){

if(!selectedLat){

alert("Select a location first")

return

}

let data = await fetchClimate()

let result = processClimate(data)

document.getElementById("avgTemp").innerText =
result.avgTemp.toFixed(1)+" °C"

document.getElementById("avgRain").innerText =
result.avgRain.toFixed(0)+" mm"

document.getElementById("trendTemp").innerText =
result.tempTrend.toFixed(3)+" °C/year"

document.getElementById("trendRain").innerText =
result.rainTrend.toFixed(2)+" mm/year"

document.getElementById("years").innerText =
result.years

document.getElementById("analysisPanel").style.display="block"

}

</script>

</body>
</html>
