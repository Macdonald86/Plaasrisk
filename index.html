<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}

.control-bar{
display:flex;gap:10px;padding:10px;background:white;
border-bottom:1px solid #ddd;flex-wrap:wrap;
}

button{
background:#2e7d32;border:none;color:white;
padding:8px 14px;border-radius:6px;cursor:pointer;
}
button:hover{background:#1b5e20;}

input{
padding:8px;border:1px solid #ccc;border-radius:6px;
}

#map{height:80vh;}

.analysis-panel{
position:absolute;top:100px;right:20px;width:350px;
background:white;border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.25);
display:none;
}

.panel-header{
background:#2e7d32;color:white;padding:10px;
font-weight:bold;
}

.panel-body{padding:15px;}

.metric{margin-bottom:12px;}
.metric-title{font-size:13px;color:#444;}
.metric-value{font-size:20px;font-weight:bold;}

</style>
</head>

<body>

<div class="control-bar">
<input id="searchInput" placeholder="Search location or lat,lon">
<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="runAnalysis()">Analyze</button>
</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">Climate Analysis</div>
<div class="panel-body">
<div id="metrics"></div>
<canvas id="rainChart"></canvas>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map, marker, selectedPoint=null, pinMode=false
let rainChart=null

function initMap(){
map=L.map("map").setView([-25.7,28.2],6)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

map.on("click", function(e){
if(!pinMode) return

const {lat,lng}=e.latlng

if(marker) map.removeLayer(marker)

marker=L.marker([lat,lng]).addTo(map)

selectedPoint={lat:lat,lng:lng}

pinMode=false
})
}

window.onload=initMap

function activatePinMode(){
pinMode=true
}

/* SEARCH */

async function searchLocation(){

const q=document.getElementById("searchInput").value

if(q.includes(",")){
const [lat,lon]=q.split(",")
setPoint(parseFloat(lat),parseFloat(lon))
return
}

const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
const d=await r.json()

if(d.length){
setPoint(parseFloat(d[0].lat),parseFloat(d[0].lon))
}else{
alert("Location not found")
}
}

function setPoint(lat,lon){
if(marker) map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],10)

selectedPoint={lat:lat,lng:lon}
}

/* FETCH CLIMATE */

async function fetchClimate(lat,lon){

const endYear=new Date().getFullYear()-1

const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2000-01-01&end_date=${endYear}-12-31&daily=temperature_2m_min,precipitation_sum&timezone=auto`

const r=await fetch(url)
const data=await r.json()

return data.daily
}

/* DETECT EVENTS */

function detectEvents(daily){

let frost={}, rain10={}

daily.time.forEach((d,i)=>{

const year=new Date(d).getFullYear()
const rain=daily.precipitation_sum[i]||0
const temp=daily.temperature_2m_min[i]

if(temp<=0 && !frost[year]){
frost[year]=d
}

if(rain>=10 && !rain10[year]){
rain10[year]=d
}

})

return {frost,rain10}
}

/* HELPERS */

function avgDOY(obj){

let days=Object.values(obj).map(d=>{
const date=new Date(d)
const start=new Date(date.getFullYear(),0,0)
return (date-start)/(1000*60*60*24)
})

if(days.length===0) return null

return days.reduce((a,b)=>a+b)/days.length
}

function doyToDate(d){
const date=new Date(2000,0)
date.setDate(d)
return date.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})
}

/* SCORING */

function plantingScore(frostDay,rainDay){

let summer=0, winter=0

if(rainDay){
if(rainDay<320) summer=95
else if(rainDay<350) summer=75
else summer=40
}

if(frostDay){
if(frostDay<200) winter=95
else if(frostDay<260) winter=70
else winter=40
}

return {summer,winter}
}

function getColor(score){
if(score>=80) return "green"
if(score>=60) return "orange"
return "red"
}

/* PROCESS DATA */

function process(daily){

let rainYearly={}

daily.time.forEach((d,i)=>{
const y=new Date(d).getFullYear()

if(!rainYearly[y]) rainYearly[y]=0

rainYearly[y]+=daily.precipitation_sum[i]||0
})

return {
years:Object.keys(rainYearly),
rain:Object.values(rainYearly)
}
}

/* MAIN ANALYSIS */

async function runAnalysis(){

if(!selectedPoint){
alert("Please select a location")
return
}

const daily=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

const climate=process(daily)
const events=detectEvents(daily)

const frostDay=avgDOY(events.frost)
const rainDay=avgDOY(events.rain10)

const frostDate=frostDay?doyToDate(frostDay):"N/A"
const rainDate=rainDay?doyToDate(rainDay):"N/A"

const scores=plantingScore(frostDay,rainDay)

document.getElementById("metrics").innerHTML=`

<div class="metric">
<div class="metric-title">Avg First Frost</div>
<div class="metric-value">${frostDate}</div>
</div>

<div class="metric">
<div class="metric-title">Avg First Rain ≥10mm</div>
<div class="metric-value">${rainDate}</div>
</div>

<div class="metric">
<div class="metric-title">🌽 Summer Crop Score</div>
<div class="metric-value" style="color:${getColor(scores.summer)}">
${scores.summer}/100
</div>
</div>

<div class="metric">
<div class="metric-title">🌾 Winter Crop Score</div>
<div class="metric-value" style="color:${getColor(scores.winter)}">
${scores.winter}/100
</div>
</div>
`

/* CHART */

if(rainChart) rainChart.destroy()

rainChart=new Chart(document.getElementById("rainChart"),{
type:"bar",
data:{
labels:climate.years,
datasets:[{
label:"Annual Rainfall (mm)",
data:climate.rain
}]
}
})

document.getElementById("analysisPanel").style.display="block"
}

</script>

</body>
</html>
