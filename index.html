```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk AI Underwriting Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}
.control-bar{display:flex;gap:10px;padding:10px;background:white;border-bottom:1px solid #ddd;flex-wrap:wrap;}
button{background:#2e7d32;border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;}
input{padding:8px;border:1px solid #ccc;border-radius:6px;}
#map{height:70vh;}
.analysis-panel{position:absolute;top:80px;right:20px;width:520px;background:white;border-radius:12px;box-shadow:0 6px 25px rgba(0,0,0,0.3);display:none;z-index:99999;}
.panel-header{background:#2e7d32;color:white;padding:12px;font-weight:bold;}
.panel-body{padding:20px;max-height:75vh;overflow:auto;}
#portfolioPanel{padding:15px;background:white;margin:10px;border-radius:10px;}
canvas{margin-top:20px;}
</style>
</head>

<body>

<div class="control-bar">
<input id="searchInput" placeholder="Search or lat,lon">
<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<div id="map"></div>

<div id="portfolioPanel">
<h3>🌍 Portfolio Dashboard</h3>
<table border="1" width="100%" style="border-collapse:collapse;font-size:13px">
<thead>
<tr>
<th>Location</th><th>Risk</th><th>Yield</th><th>Drought%</th><th>Decision</th><th>Alert</th>
</tr>
</thead>
<tbody id="portfolioTable"></tbody>
</table>
</div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">AI Climate Risk Report</div>
<div class="panel-body">
<div id="metrics"></div>
<canvas id="rainChart"></canvas>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map, marker, drawnItems, selectedPoint=null, pinMode=false
let rainChart=null
let portfolio=[]
let reportData={}

/* MAP */
function initMap(){
map=L.map("map").setView([-25.7,28.2],6)
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{polygon:true,rectangle:true},
edit:{featureGroup:drawnItems}
})
map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.clearLayers()
const layer=e.layer
drawnItems.addLayer(layer)
selectedPoint=layer.getBounds().getCenter()
})

map.on("click",function(e){
if(!pinMode)return
const {lat,lng}=e.latlng
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)
selectedPoint={lat,lng}
pinMode=false
})
}
window.onload=initMap

function activatePinMode(){pinMode=true}

function resetMap(){
if(marker) map.removeLayer(marker)
drawnItems.clearLayers()
selectedPoint=null
document.getElementById("analysisPanel").style.display="none"
}

/* SEARCH */
async function searchLocation(){
const q=document.getElementById("searchInput").value
if(q.includes(",")){
const [lat,lon]=q.split(",")
setPoint(lat,lon);return
}
const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
const d=await r.json()
if(d.length)setPoint(d[0].lat,d[0].lon)
}

function setPoint(lat,lon){
if(marker) map.removeLayer(marker)
marker=L.marker([lat,lon]).addTo(map)
map.setView([lat,lon],10)
selectedPoint={lat:parseFloat(lat),lng:parseFloat(lon)}
}

/* FETCH */
async function fetchClimate(lat,lon){
const endYear=new Date().getFullYear()-1
const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2000-01-01&end_date=${endYear}-12-31&daily=temperature_2m_min,precipitation_sum&timezone=auto`
const r=await fetch(url)
return (await r.json()).daily
}

/* PROCESS */
function processClimate(d){
let rain={}, frost={}
d.time.forEach((t,i)=>{
const y=new Date(t).getFullYear()
if(!rain[y]){rain[y]=0;frost[y]=0}
rain[y]+=d.precipitation_sum[i]||0
if(d.temperature_2m_min[i]<=0) frost[y]++
})
const years=Object.keys(rain)
return{
years,
rain:Object.values(rain),
frost:Object.values(frost),
avgRain:(Object.values(rain).reduce((a,b)=>a+b)/years.length).toFixed(0),
avgFrost:(Object.values(frost).reduce((a,b)=>a+b)/years.length).toFixed(1)
}
}

/* EVENTS */
function detectEvents(d){
let frost={}, rain10={}
d.time.forEach((t,i)=>{
const y=new Date(t).getFullYear()
if(d.temperature_2m_min[i]<=0&&!frost[y])frost[y]=t
if(d.precipitation_sum[i]>=10&&!rain10[y])rain10[y]=t
})
return{frost,rain10}
}

/* DOY */
function toDOY(dateStr){
const d=new Date(dateStr)
return Math.floor((d-new Date(d.getFullYear(),0,0))/(1000*60*60*24))
}

function doyToReadable(doy){
const date=new Date(2000,0)
date.setDate(doy)
return date.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})
}

/* ADVANCED */
function advanced(d){
let seasons={},start={}
d.time.forEach((t,i)=>{
const dt=new Date(t),m=dt.getMonth()+1,y=dt.getFullYear()
let s
if(m>=10)s=y
else if(m<=3)s=y-1
else return
const label=s+"/"+(s+1)
if(!seasons[label])seasons[label]=0
seasons[label]+=d.precipitation_sum[i]||0
if(m==10||m==11){
if(!start[label])start[label]=0
start[label]+=d.precipitation_sum[i]||0
}
})
const vals=Object.values(seasons)
const mean=vals.reduce((a,b)=>a+b)/vals.length
const std=Math.sqrt(vals.reduce((a,b)=>a+Math.pow(b-mean,2),0)/vals.length)
const cv=((std/mean)*100).toFixed(1)
const dry=(Object.values(start).filter(v=>v<50).length/Object.keys(start).length*100).toFixed(1)
let rel=100-cv;if(rel<0)rel=0
return{cv,dry,rel}
}

/* PLANTING WINDOW */
function avgDOY(obj){
let vals=Object.values(obj)
if(vals.length===0)return null
let days=vals.map(d=>{
const dt=new Date(d)
return (dt-new Date(dt.getFullYear(),0,0))/(1000*60*60*24)
})
return days.reduce((a,b)=>a+b)/days.length
}

function maizeWindow(rainDay,frostDay){
if(!rainDay||!frostDay)return{plant:"N/A",frost:"N/A",days:"N/A"}
const days=Math.round(frostDay-rainDay)
return{
plant:doyToReadable(rainDay),
frost:doyToReadable(frostDay),
days
}
}

/* AI */
function ai(frostScore,droughtScore,excessScore){
let score=(frostScore*0.3+droughtScore*0.5+excessScore*0.2)
let decision=score>80?"ACCEPT":score>60?"LOAD":"DECLINE"
return{score:score.toFixed(0),decision}
}

/* CHART: PLANTING WINDOW */
function drawPlantingChart(years,doyValues){
if(rainChart)rainChart.destroy()
rainChart=new Chart(document.getElementById("rainChart"),{
type:"line",
data:{
labels:years,
datasets:[{
label:"Planting Start (≥10mm Rainfall)",
data:doyValues,
tension:0.2
}]
},
options:{
plugins:{
tooltip:{
callbacks:{
label:function(ctx){
return "Planting: "+doyToReadable(ctx.raw)
}
}
}
},
scales:{
y:{title:{display:true,text:"Day of Year"}},
x:{title:{display:true,text:"Year"}}
}
}
})
}

/* ANALYSIS */
async function runAnalysis(){

if(!selectedPoint){alert("Select location");return}

const d=await fetchClimate(selectedPoint.lat,selectedPoint.lng)
const c=processClimate(d)
const ev=detectEvents(d)
const adv=advanced(d)

const plantingYears=Object.keys(ev.rain10)
const plantingDOY=plantingYears.map(y=>toDOY(ev.rain10[y]))

const rainDay=avgDOY(ev.rain10)
const frostDay=avgDOY(ev.frost)

const window=maizeWindow(rainDay,frostDay)

const droughtScore=100-adv.dry
const frostScore=100-c.avgFrost*2
const excessScore=100-adv.cv

const aiRes=ai(frostScore,droughtScore,excessScore)

portfolio.push({
location:selectedPoint.lat.toFixed(2)+","+selectedPoint.lng.toFixed(2),
risk:aiRes.score,
yield:excessScore,
drought:adv.dry,
decision:aiRes.decision
})

updateTable()

document.getElementById("metrics").innerHTML=`
<b>AI Risk:</b> ${aiRes.score}/100 (${aiRes.decision})<br><hr>

Avg Rainfall: ${c.avgRain} mm<br>
Avg Frost Days: ${c.avgFrost}<br>

Variability: ${adv.cv}%<br>
Dry Start: ${adv.dry}%<br>
Reliability: ${adv.rel}/100<br><hr>

🌽 Plant Date: ${window.plant}<br>
❄️ Frost Date: ${window.frost}<br>
Growing Days: ${window.days}
`

drawPlantingChart(plantingYears,plantingDOY)

document.getElementById("analysisPanel").style.display="block"

reportData={...c,...adv,...window,...aiRes}
}

/* TABLE */
function updateTable(){
const t=document.getElementById("portfolioTable")
portfolio.sort((a,b)=>b.risk-a.risk)
t.innerHTML=portfolio.map(f=>{
let alert="OK"
if(f.drought>40)alert="⚠️"
if(f.risk<60)alert="❌"
return `<tr>
<td>${f.location}</td>
<td>${f.risk}</td>
<td>${f.yield}</td>
<td>${f.drought}%</td>
<td>${f.decision}</td>
<td>${alert}</td>
</tr>`
}).join("")
}

/* PDF */
function downloadPDF(){
const {jsPDF}=window.jspdf
const doc=new jsPDF()
doc.text("Climate Risk Report",20,20)
let y=40
Object.entries(reportData).forEach(([k,v])=>{
doc.text(`${k}: ${v}`,20,y);y+=8
})
doc.save("report.pdf")
}

</script>

</body>
</html>
```
