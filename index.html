<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaasRisk AI Underwriting Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f7f4;}
.control-bar{display:flex;gap:10px;padding:10px;background:white;border-bottom:1px solid #ddd;flex-wrap:wrap;}
button{background:#2e7d32;border:none;color:white;padding:8px 14px;border-radius:6px;cursor:pointer;}
input{padding:8px;border:1px solid #ccc;border-radius:6px;}
#map{height:80vh;}
.analysis-panel{
position:absolute;
top:80px;
right:20px;
width:520px;
background:white;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.3);
display:none;
z-index:99999;
}
.panel-header{background:#2e7d32;color:white;padding:12px;font-weight:bold;}
.panel-body{padding:20px;max-height:75vh;overflow:auto;}
</style>
</head>

<body>

<div class="control-bar">
<input id="latInput" placeholder="Latitude">
<input id="lonInput" placeholder="Longitude">
<button onclick="setLatLon()">Set Location</button>
<input id="searchInput" placeholder="Search location">
<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>
<button onclick="downloadPDF()">PDF</button>
</div>

<div id="map"></div>

<div class="analysis-panel" id="analysisPanel">
<div class="panel-header">Climate Risk Report</div>
<div class="panel-body">
<div id="metrics"></div>
<canvas id="rainChart"></canvas>
<canvas id="frostChart"></canvas>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map, marker, drawnItems, selectedPoint=null, pinMode=false
let rainChart=null, frostChart=null
let reportData={}

/* MAP */
function initMap(){
map=L.map("map").setView([-25.7,28.2],6)
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

map.addControl(new L.Control.Draw({
draw:{polygon:true,rectangle:true},
edit:{featureGroup:drawnItems}
}))

map.on(L.Draw.Event.CREATED,function(e){
drawnItems.clearLayers()
drawnItems.addLayer(e.layer)
selectedPoint=e.layer.getBounds().getCenter()
})

map.on("click",function(e){
if(!pinMode)return
const {lat,lng}=e.latlng
latInput.value=lat.toFixed(4)
lonInput.value=lng.toFixed(4)
if(marker)map.removeLayer(marker)
marker=L.marker([lat,lng]).addTo(map)
selectedPoint={lat,lng}
pinMode=false
})
}
window.onload=initMap

function activatePinMode(){pinMode=true}
function resetMap(){if(marker)map.removeLayer(marker);drawnItems.clearLayers();selectedPoint=null}

/* LOCATION */
function setLatLon(){
const lat=parseFloat(latInput.value)
const lon=parseFloat(lonInput.value)
if(isNaN(lat)||isNaN(lon))return alert("Invalid")
selectedPoint={lat,lng:lon}
}

async function searchLocation(){
const q=searchInput.value
const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
const d=await r.json()
if(d.length)selectedPoint={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)}
}

/* FETCH */
async function fetchClimate(lat,lon){
const endYear=new Date().getFullYear()-1
const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2000-01-01&end_date=${endYear}-12-31&daily=temperature_2m_min,precipitation_sum&timezone=auto`
const r=await fetch(url)
const data=await r.json()
return data.daily
}

/* PROCESS */
function seasonalRainfall(d){
let seasons={}
d.time.forEach((t,i)=>{
const dt=new Date(t),m=dt.getMonth()+1,y=dt.getFullYear()
let s;if(m>=10)s=y;else if(m<=3)s=y-1;else return
const label=s+"/"+(s+1)
if(!seasons[label])seasons[label]=0
seasons[label]+=d.precipitation_sum[i]||0
})
return{years:Object.keys(seasons),values:Object.values(seasons)}
}

function frostAnalysis(d){
let frost={}
d.time.forEach((t,i)=>{
const y=new Date(t).getFullYear()
if(!frost[y])frost[y]=0
if(d.temperature_2m_min[i]<=0)frost[y]++
})
return frost
}

function detectPlanting(d){
let planting={}
for(let i=0;i<d.time.length;i++){
const y=new Date(d.time[i]).getFullYear()
if(d.precipitation_sum[i]>=10&&!planting[y]){
planting[y]=d.time[i]
}
}
return planting
}

function toDOY(d){const dt=new Date(d);return Math.floor((dt-new Date(dt.getFullYear(),0,0))/(1000*60*60*24))}
function doyToReadable(d){const dt=new Date(2000,0);dt.setDate(d);return dt.toLocaleDateString("en-ZA",{day:"numeric",month:"short"})}

function plantingWindow(p){
const days=Object.values(p).map(d=>toDOY(d)).sort((a,b)=>a-b)
if(days.length<5)return{start:"N/A",end:"N/A",length:"N/A"}
const p20=days[Math.floor(days.length*0.2)]
const p80=days[Math.floor(days.length*0.8)]
return{start:doyToReadable(p20),end:doyToReadable(p80),length:p80-p20}
}

/* CHARTS */
function drawRain(y,v){
if(rainChart)rainChart.destroy()
rainChart=new Chart(document.getElementById("rainChart"),{
type:"bar",
data:{labels:y,datasets:[{label:"Rainfall",data:v}]}
})
}

function drawFrost(y,v){
if(frostChart)frostChart.destroy()
frostChart=new Chart(document.getElementById("frostChart"),{
type:"line",
data:{labels:y,datasets:[{label:"Frost Days",data:v,tension:0.3}]}
})
}

/* ANALYSIS */
async function runAnalysis(){

if(!selectedPoint)return alert("Select location")

const d=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

const seasonal=seasonalRainfall(d)
const frost=frostAnalysis(d)
const planting=detectPlanting(d)
const window=plantingWindow(planting)

drawRain(seasonal.years,seasonal.values)
drawFrost(Object.keys(frost),Object.values(frost))

document.getElementById("metrics").innerHTML=`
<h3>Rainfall</h3>
Avg seasonal rainfall shown in graph

<h3>Frost</h3>
${Object.keys(frost).slice(-10).map((y,i)=>`${y}: ${Object.values(frost).slice(-10)[i]} days`).join("<br>")}

<h3>Planting Window</h3>
${window.start} → ${window.end} (${window.length} days)
`

document.getElementById("analysisPanel").style.display="block"
}

/* PDF */
function downloadPDF(){
const {jsPDF}=window.jspdf
const doc=new jsPDF()

doc.text("PlaasRisk Report",20,20)
doc.text("Generated by Makoro Macdonald",20,30)

const img=document.getElementById("rainChart").toDataURL("image/png")
doc.addImage(img,"PNG",20,40,170,60)

doc.save("report.pdf")
}

</script>

<div style="font-size:11px;padding:10px;border-top:1px solid #ddd;background:#fafafa;">
<b>Disclaimer:</b> Indicative only. Not insurance advice.
</div>

</body>
</html>
