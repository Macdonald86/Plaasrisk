<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PlaasRisk Climate Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:#f4f7f4;
}

.control-bar{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:10px;
background:white;
border-bottom:1px solid #ddd;
align-items:center;
}

.control-bar input{
flex:1;
min-width:180px;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2e7d32;
border:none;
color:white;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.status-bar{
margin-left:auto;
font-size:13px;
color:#555;
}

#map{
height:calc(100vh - 60px);
}

.analysis-panel{
position:absolute;
top:100px;
right:20px;
width:380px;
max-width:95vw;
background:white;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.25);
display:none;
z-index:10000;
overflow:hidden;
}

.panel-header{
background:#2e7d32;
color:white;
padding:10px;
cursor:move;
font-weight:bold;
}

.panel-body{
padding:15px;
max-height:65vh;
overflow:auto;
}

.metric{margin-bottom:12px;}

.metric-title{
font-size:13px;
color:#444;
}

.metric-value{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

.error-box{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:#e53935;
color:white;
padding:10px 20px;
border-radius:6px;
display:none;
z-index:20000;
}

canvas{
margin-top:20px;
}

@media(max-width:700px){

.analysis-panel{
top:auto;
bottom:0;
right:0;
left:0;
width:100%;
border-radius:15px 15px 0 0;
}

}

</style>
</head>

<body>

<div class="control-bar">

<input id="searchInput" placeholder="Search location or lat,lon">

<button onclick="searchLocation()">Search</button>
<button onclick="activatePinMode()">Drop Pin</button>
<button onclick="resetMap()">Clear</button>
<button onclick="runAnalysis()">Analyze</button>

<div class="status-bar" id="statusBar">Ready</div>

</div>

<div id="map"></div>

<div class="error-box" id="errorBox"></div>

<div class="analysis-panel" id="analysisPanel">

<div class="panel-header" id="panelHeader">
Farm Climate Analysis
</div>

<div class="panel-body">

<div id="metrics"></div>

<canvas id="rainChart"></canvas>
<canvas id="seasonChart"></canvas>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>

let map
let marker
let drawnItems
let selectedPoint=null
let droughtLayer=null

let rainChart=null
let seasonalChart=null

function setStatus(t){
document.getElementById("statusBar").innerText=t
}

function showError(msg){
const box=document.getElementById("errorBox")
box.innerText=msg
box.style.display="block"
setTimeout(()=>{box.style.display="none"},4000)
}

function initMap(){

map=L.map("map").setView([-25.7,28.2],6)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

drawnItems=new L.FeatureGroup()
map.addLayer(drawnItems)

const drawControl=new L.Control.Draw({
draw:{polygon:true,rectangle:true,circle:false,polyline:false,marker:false},
edit:{featureGroup:drawnItems}
})

map.addControl(drawControl)

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.clearLayers()

const layer=e.layer
drawnItems.addLayer(layer)

selectedPoint=layer.getBounds().getCenter()

})

}

window.onload=initMap

async function searchLocation(){

const q=document.getElementById("searchInput").value

try{

if(q.includes(",")){
const p=q.split(",")
setPoint(parseFloat(p[0]),parseFloat(p[1]))
return
}

const url=`https://nominatim.openstreetmap.org/search?format=json&q=${q}`

const r=await fetch(url)
const d=await r.json()

if(d.length>0){
setPoint(d[0].lat,d[0].lon)
}else{
showError("Location not found")
}

}catch{
showError("Search failed")
}

}

function setPoint(lat,lon){

lat=Number(lat)
lon=Number(lon)

if(marker) map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)

map.setView([lat,lon],10)

selectedPoint={lat:lat,lng:lon}

}

function activatePinMode(){

map.once("click",function(e){
setPoint(e.latlng.lat,e.latlng.lng)
})

}

function resetMap(){

drawnItems.clearLayers()

if(marker) map.removeLayer(marker)

selectedPoint=null

document.getElementById("analysisPanel").style.display="none"

if(droughtLayer) map.removeLayer(droughtLayer)

}

async function fetchClimate(lat,lon){

let combined={
time:[],
precipitation_sum:[],
temperature_2m_min:[],
temperature_2m_mean:[]
}

const currentYear=new Date().getFullYear()

for(let year=2000;year<=currentYear;year++){

setStatus("Downloading "+year)

const start=`${year}-01-01`
const end=`${year}-12-31`

const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${start}&end_date=${end}&daily=temperature_2m_min,temperature_2m_mean,precipitation_sum&timezone=auto`

const r=await fetch(url)

if(!r.ok) continue

const d=await r.json()

if(!d.daily) continue

combined.time.push(...d.daily.time)
combined.precipitation_sum.push(...d.daily.precipitation_sum)
combined.temperature_2m_min.push(...d.daily.temperature_2m_min)
combined.temperature_2m_mean.push(...d.daily.temperature_2m_mean)

}

return combined

}

function processClimate(daily){

let yearlyRain={}
let yearlyFrost={}
let yearlyDays={}

daily.time.forEach((d,i)=>{

const year=new Date(d).getFullYear()

if(!yearlyRain[year]){
yearlyRain[year]=0
yearlyFrost[year]=0
yearlyDays[year]=0
}

yearlyRain[year]+=daily.precipitation_sum[i]||0
yearlyDays[year]++

if(daily.temperature_2m_min[i]<=0) yearlyFrost[year]++

})

const years=Object.keys(yearlyRain).filter(y=>yearlyDays[y]>=360)

const rain=years.map(y=>yearlyRain[y])
const frost=years.map(y=>yearlyFrost[y])

const avgRain=rain.reduce((a,b)=>a+b,0)/rain.length
const avgFrost=frost.reduce((a,b)=>a+b,0)/frost.length

return{
years,rain,frost,
avgRain:avgRain.toFixed(0),
avgFrost:avgFrost.toFixed(1)
}

}

function seasonalRain(daily){

let seasons={}
let days={}

daily.time.forEach((d,i)=>{

const date=new Date(d)
const m=date.getMonth()+1
const y=date.getFullYear()

let s

if(m>=10) s=y
else if(m<=3) s=y-1
else return

const label=s+"/"+(s+1)

if(!seasons[label]){
seasons[label]=0
days[label]=0
}

seasons[label]+=daily.precipitation_sum[i]||0
days[label]++

})

const labels=Object.keys(seasons).filter(l=>days[l]>=170)
const values=labels.map(l=>seasons[l])

const avg=values.reduce((a,b)=>a+b,0)/values.length

const drought=[]
const wet=[]

labels.forEach((l,i)=>{
drought.push(values[i] < avg*0.75)
wet.push(values[i] > avg*1.25)
})

return{labels,values,drought,wet}

}

function calculateDroughtProbability(season){

let droughtCount=0

season.values.forEach((v,i)=>{
if(season.drought[i]) droughtCount++
})

const probability=(droughtCount/season.values.length)*100

return probability.toFixed(1)

}

function drawDroughtMap(lat,lon,prob){

if(droughtLayer) map.removeLayer(droughtLayer)

let color

if(prob<20) color="#2e7d32"
else if(prob<40) color="#fdd835"
else if(prob<60) color="#fb8c00"
else color="#c62828"

droughtLayer=L.circle([lat,lon],{
radius:40000,
color:color,
fillColor:color,
fillOpacity:0.35
}).addTo(map)

droughtLayer.bindPopup("Drought Probability: "+prob+"%")

}

async function runAnalysis(){

if(!selectedPoint){
showError("Select location first")
return
}

try{

setStatus("Loading climate history")

const daily=await fetchClimate(selectedPoint.lat,selectedPoint.lng)

setStatus("Processing climate")

const climate=processClimate(daily)
const season=seasonalRain(daily)

showMetrics(climate,season)

drawRainChart(climate)
drawSeasonChart(season)

const prob=calculateDroughtProbability(season)

drawDroughtMap(
selectedPoint.lat,
selectedPoint.lng,
prob
)

document.getElementById("analysisPanel").style.display="block"

setStatus("Complete")

}catch(e){

console.error(e)
showError("Climate loading failed")
setStatus("Error")

}

}

function showMetrics(c,s){

const droughtYears=s.labels.filter((l,i)=>s.drought[i])
const wetYears=s.labels.filter((l,i)=>s.wet[i])

const prob=calculateDroughtProbability(s)

document.getElementById("metrics").innerHTML=`

<div class="metric">
<div class="metric-title">Average Annual Rainfall</div>
<div class="metric-value">${c.avgRain} mm</div>
</div>

<div class="metric">
<div class="metric-title">Average Frost Days</div>
<div class="metric-value">${c.avgFrost}</div>
</div>

<div class="metric">
<div class="metric-title">Drought Probability</div>
<div class="metric-value">${prob}%</div>
</div>

<div class="metric">
<div class="metric-title">Seasonal Drought Years</div>
<div>${droughtYears.join(", ") || "None detected"}</div>
</div>

<div class="metric">
<div class="metric-title">Excess Rainfall Seasons</div>
<div>${wetYears.join(", ") || "None detected"}</div>
</div>

`

}

function drawRainChart(c){

if(rainChart) rainChart.destroy()

rainChart=new Chart(document.getElementById("rainChart"),{

type:"bar",

data:{
labels:c.years,
datasets:[{
label:"Annual Rainfall (mm)",
data:c.rain,
backgroundColor:"#4CAF50"
}]
},

options:{responsive:true}

})

}

function drawSeasonChart(s){

if(seasonalChart) seasonalChart.destroy()

const colors=s.values.map((v,i)=>{
if(s.drought[i]) return "#e53935"
if(s.wet[i]) return "#1e88e5"
return "#4CAF50"
})

seasonalChart=new Chart(document.getElementById("seasonChart"),{

type:"bar",

data:{
labels:s.labels,
datasets:[{
label:"Seasonal Rainfall Oct–Mar",
data:s.values,
backgroundColor:colors
}]
},

options:{responsive:true}

})

}

</script>

</body>
</html>
